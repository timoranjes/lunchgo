<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>午膳快 LunchGo</title>
  <style>
    :root {
      --brand: #07C160;
      --brand-dark: #06ad56;
      --brand-light: #e8f5e9;
      --brand-glow: rgba(7,193,96,0.15);
      --bg: #f5f5f5;
      --card: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-muted: #999999;
      --border: #e8e8e8;
      --border-light: #f0f0f0;
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.10);
      --accent-red: #E74C3C;
      --accent-yellow: #FFC107;
      --accent-orange: #FF9800;
      --accent-blue: #2196F3;
      --accent-purple: #9B59B6;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      background: var(--bg); color: var(--text-primary); font-size: 14px;
      line-height: 1.5; -webkit-font-smoothing: antialiased; overflow-x: hidden;
      padding-bottom: 70px;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes pulse-marker { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(2.2); opacity: 0; } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* CSS Icons */
    .icon { display: inline-block; width: 1em; height: 1em; vertical-align: -0.125em; }
    .icon-pin::before { content: ""; display: inline-block; width: 0.75em; height: 0.75em; border: 2px solid currentColor; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); }
    .icon-search::before { content: ""; display: inline-block; width: 0.6em; height: 0.6em; border: 2px solid currentColor; border-radius: 50%; position: relative; }
    .icon-search::after { content: ""; display: inline-block; width: 0.3em; height: 2px; background: currentColor; position: absolute; transform: rotate(45deg) translate(0.5em, 0.5em); }
    .icon-star::before { content: "\2605"; }
    .icon-clock::before { content: "\1F550"; font-style: normal; }
    .icon-phone::before { content: "\260E"; }
    .icon-link::before { content: "\1F517"; font-style: normal; }
    .icon-nav::before { content: "\25B6"; font-size: 0.8em; }
    .icon-heart::before { content: "\2665"; }
    .icon-heart-filled::before { content: "\2665"; }
    .icon-close::before { content: "\2715"; }
    .icon-arrow-left::before { content: "\2190"; }
    .icon-arrow-right::before { content: "\203A"; }
    .icon-plus::before { content: "\FF0B"; }
    .icon-gps::before { content: "\25CE"; }
    .icon-list::before { content: "\2630"; }
    .icon-map::before { content: "\25A1"; }
    .icon-sort::before { content: "\2195"; }
    .icon-filter::before { content: "\25BD"; }
    .icon-home::before { content: "\2302"; }
    .icon-settings::before { content: "\2699"; }
    .icon-refresh::before { content: "\21BB"; }
    .icon-menu::before { content: "\2261"; }
    .icon-location::before { content: "\27E1"; }
    .icon-dollar::before { content: "\FF04"; }

    /* Header */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px; background: var(--card); position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid var(--border-light);
      backdrop-filter: blur(10px);
    }
    .header-title { font-size: 22px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.5px; }
    .menu-btn { padding: 8px; cursor: pointer; border-radius: 8px; transition: var(--transition); }
    .menu-btn:hover { background: var(--border-light); }
    .menu-btn-icon { font-size: 22px; color: var(--text-secondary); line-height: 1; }

    /* Search Bar */
    .search-bar {
      padding: 10px 16px; background: var(--card); border-bottom: 1px solid var(--border-light);
      position: sticky; top: 52px; z-index: 99;
    }
    .search-input-wrapper {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      background: var(--bg); border-radius: var(--radius-sm); border: 1.5px solid var(--border);
      transition: var(--transition);
    }
    .search-input-wrapper:focus-within { border-color: var(--brand); box-shadow: 0 0 0 2px var(--brand-glow); }
    .search-icon { color: var(--text-muted); font-size: 16px; }
    .search-input {
      flex: 1; border: none; background: transparent; font-size: 14px; outline: none;
      color: var(--text-primary);
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-clear {
      padding: 4px 8px; border-radius: 50%; background: var(--border); color: var(--text-secondary);
      font-size: 12px; cursor: pointer; display: none; transition: var(--transition);
    }
    .search-clear.show { display: block; }

    /* Location Bar */
    .location-bar {
      display: flex; align-items: center; gap: 8px; padding: 10px 16px;
      background: var(--card); border-bottom: 1px solid var(--border-light);
      position: sticky; top: 52px; z-index: 99;
    }
    .location-current {
      flex: 1; display: flex; align-items: center; gap: 6px;
      font-size: 14px; font-weight: 500; cursor: pointer; padding: 8px 12px;
      border-radius: var(--radius-sm); background: var(--bg); transition: var(--transition);
    }
    .location-current:hover { background: var(--border-light); }
    .loc-pin { color: var(--brand); font-size: 16px; }
    .location-sub { font-size: 11px; color: var(--text-muted); margin-left: 4px; }
    .location-refresh {
      padding: 8px 14px; border-radius: var(--radius-xs); background: var(--brand);
      color: #fff; font-size: 12px; font-weight: 500; border: none; cursor: pointer;
      transition: var(--transition);
    }
    .location-refresh:hover { background: var(--brand-dark); }
    .location-refresh:active { transform: scale(0.95); }

    /* Container */
    .container { padding: 0 16px 20px; animation: fadeIn 0.3s ease; }
    .card {
      background: var(--card); border-radius: var(--radius); padding: 16px;
      margin-bottom: 12px; box-shadow: var(--shadow);
      animation: fadeInUp 0.3s ease;
      transition: var(--transition);
    }
    .card:hover { box-shadow: var(--shadow-lg); }

    /* Sort/Filter Bar */
    .sort-filter-bar {
      display: flex; align-items: center; gap: 8px; padding: 10px 16px;
      background: var(--card); border-bottom: 1px solid var(--border-light);
      position: sticky; top: 52px; z-index: 98;
    }
    .sort-btn, .filter-btn {
      display: flex; align-items: center; gap: 4px; padding: 6px 12px;
      border-radius: var(--radius-xs); background: var(--bg); border: 1.5px solid var(--border);
      font-size: 13px; color: var(--text-secondary); cursor: pointer; transition: var(--transition);
    }
    .sort-btn.active, .filter-btn.active { background: var(--brand-light); color: var(--brand); border-color: var(--brand); }
    .result-count { font-size: 12px; color: var(--text-muted); margin-left: auto; }

    /* Sort Dropdown */
    .sort-dropdown {
      position: absolute; top: 100%; right: 0; background: var(--card); border-radius: var(--radius-sm);
      box-shadow: var(--shadow-lg); z-index: 200; display: none; min-width: 160px;
    }
    .sort-dropdown.show { display: block; animation: scaleIn 0.2s ease; }
    .sort-option {
      padding: 10px 14px; font-size: 14px; cursor: pointer; transition: var(--transition);
    }
    .sort-option:hover { background: var(--bg); }
    .sort-option.active { color: var(--brand); font-weight: 600; }

    /* Budget Section */
    .budget-section { padding: 18px 16px; }
    .budget-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .budget-label { font-size: 15px; font-weight: 500; color: var(--text-secondary); }
    .budget-value { font-size: 20px; font-weight: 700; color: var(--brand); }
    .budget-slider { width: 100%; margin: 10px 0; accent-color: var(--brand); height: 6px; }
    .budget-slider::-webkit-slider-thumb { width: 20px; height: 20px; }
    .mode-toggle { display: flex; gap: 8px; margin-top: 14px; }
    .mode-btn {
      flex: 1; text-align: center; padding: 8px; border-radius: var(--radius-xs);
      background: var(--bg); color: var(--text-secondary); font-size: 12px; font-weight: 500;
      cursor: pointer; transition: var(--transition);
    }
    .mode-btn.active { background: var(--brand-light); color: var(--brand); font-weight: 600; }

    /* Cuisine Chips */
    .cuisine-scroll { overflow-x: auto; white-space: nowrap; margin: 14px 0; -webkit-overflow-scrolling: touch; }
    .cuisine-scroll::-webkit-scrollbar { display: none; }
    .cuisine-chips { display: inline-flex; gap: 8px; padding: 4px 0; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 8px 14px; border-radius: 20px; background: var(--card);
      border: 1.5px solid var(--border); font-size: 13px; color: var(--text-secondary);
      cursor: pointer; transition: var(--transition); font-weight: 500;
    }
    .chip:hover { border-color: var(--brand); }
    .chip.active { background: var(--brand); color: #fff; border-color: var(--brand); }

    /* Quick Pick Card */
    .qp-card {
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
      color: #fff; padding: 28px 20px; border-radius: 20px; cursor: pointer; margin: 14px 0;
      animation: scaleIn 0.3s ease;
      transition: var(--transition);
      box-shadow: 0 4px 20px rgba(7,193,96,0.25);
    }
    .qp-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(7,193,96,0.3); }
    .qp-card:active { transform: scale(0.98); }
    .qp-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .qp-icon { font-size: 24px; }
    .qp-title { font-size: 22px; font-weight: 700; }
    .qp-sub { font-size: 13px; opacity: 0.85; margin-top: 2px; }
    .qp-modes { display: flex; gap: 10px; margin-top: 16px; justify-content: center; }
    .qp-mode {
      flex: 1; text-align: center; padding: 10px; border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.8); font-size: 13px; font-weight: 500; cursor: pointer;
      transition: var(--transition); backdrop-filter: blur(4px);
    }
    .qp-mode.active { background: #fff; border-color: #fff; color: var(--brand); font-weight: 600; }

    /* Recommendation Card */
    .rec-card {
      padding: 20px; border-left: 4px solid var(--brand);
      animation: fadeInUp 0.4s ease;
    }
    .rec-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .rec-name { font-size: 18px; font-weight: 600; flex: 1; line-height: 1.3; }
    .heart-icon { font-size: 22px; cursor: pointer; color: #ddd; transition: var(--transition); padding: 4px; }
    .heart-icon:hover { transform: scale(1.15); }
    .heart-icon.active { color: var(--brand); }
    .rec-details { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 13px; }
    .rec-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text-muted); }
    .rec-time { color: var(--brand); font-weight: 600; }
    .rec-reason {
      font-size: 12px; color: var(--text-muted); margin-bottom: 16px;
      padding: 6px 10px; background: var(--bg); border-radius: var(--radius-xs);
    }
    .rec-address { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
    .rec-actions { display: flex; gap: 10px; }
    .action-btn {
      flex: 1; padding: 12px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
      text-align: center; border: none; cursor: pointer; transition: var(--transition);
    }
    .action-btn:active { transform: scale(0.95); }
    .btn-accept { background: var(--brand); color: #fff; }
    .btn-accept:hover { background: var(--brand-dark); }
    .btn-refresh { background: var(--bg); color: var(--text-secondary); }
    .btn-refresh:hover { background: var(--border); }
    .btn-detail { background: var(--brand-light); color: var(--brand); }
    .btn-detail:hover { background: #d5ecd8; }

    /* Enhanced Restaurant Card (List/Map) */
    .rest-card {
      display: flex; gap: 12px; padding: 14px; cursor: pointer;
      animation: fadeInUp 0.2s ease;
    }
    .rest-card:active { background: var(--bg); }
    .rest-card-image {
      width: 80px; height: 80px; border-radius: var(--radius-sm); overflow: hidden; flex-shrink: 0;
      background: var(--border-light); display: flex; align-items: center; justify-content: center;
    }
    .rest-card-image img { width: 100%; height: 100%; object-fit: cover; }
    .rest-card-image-placeholder {
      font-size: 28px; color: var(--text-muted);
    }
    .rest-card-content { flex: 1; min-width: 0; }
    .rest-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .rest-card-name { font-size: 15px; font-weight: 600; line-height: 1.3; }
    .rest-card-name-en { font-size: 12px; color: var(--text-muted); font-weight: 400; margin-top: 2px; }
    .rest-card-meta { display: flex; align-items: center; gap: 6px; margin-top: 6px; font-size: 13px; color: var(--text-secondary); }
    .rest-card-rating { display: flex; align-items: center; gap: 2px; }
    .rest-card-rating .star { color: var(--accent-yellow); }
    .rest-card-rating .count { color: var(--text-muted); font-size: 12px; }
    .rest-card-price { color: var(--accent-green); font-weight: 600; }
    .rest-card-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .rest-tag {
      font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 500;
    }
    .rest-tag-cuisine { background: var(--brand-light); color: var(--brand); }
    .rest-tag-distance { background: #e3f2fd; color: var(--accent-blue); }
    .rest-tag-open { background: #e8f5e9; color: #2e7d32; }
    .rest-tag-closed { background: #ffebee; color: #c62828; }
    .rest-tag-feature { background: var(--bg); color: var(--text-muted); }

    /* Navigation */
    .page { display: none; }
    .page.active { display: block; animation: fadeIn 0.25s ease; }
    .nav-back {
      display: flex; align-items: center; gap: 8px; padding: 14px 16px;
      cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text-secondary);
      transition: var(--transition);
    }
    .nav-back:hover { color: var(--text-primary); }

    /* Detail Page */
    .detail-hero {
      width: 100%; height: 200px; background: var(--border-light);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .detail-hero img { width: 100%; height: 100%; object-fit: cover; }
    .detail-hero-placeholder { font-size: 48px; color: var(--text-muted); }
    .detail-info-card {
      background: var(--card); border-radius: 0 0 var(--radius) var(--radius);
      padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow);
    }
    .detail-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .detail-name-en { font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
    .detail-rating-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .detail-rating { display: flex; align-items: center; gap: 4px; font-size: 16px; font-weight: 600; }
    .detail-rating .star { color: var(--accent-yellow); }
    .detail-review-count { font-size: 14px; color: var(--text-secondary); }
    .detail-price { font-size: 16px; font-weight: 600; color: var(--accent-green); }
    .detail-cuisine-tags { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .detail-section { margin-bottom: 16px; }
    .detail-section-title {
      font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px;
      padding-bottom: 6px; border-bottom: 1px solid var(--border-light);
    }
    .detail-section-content { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
    .detail-hours-row { display: flex; justify-content: space-between; align-items: center; }
    .detail-status { font-size: 13px; font-weight: 600; }
    .detail-status.open { color: #2e7d32; }
    .detail-status.closed { color: #c62828; }
    .detail-contact-link { color: var(--accent-blue); text-decoration: none; }
    .detail-contact-link:hover { text-decoration: underline; }
    .detail-map-embed {
      width: 100%; height: 200px; border: none; border-radius: var(--radius-sm);
      margin-top: 8px;
    }
    .detail-action-row { display: flex; gap: 10px; margin-top: 16px; }
    .detail-action-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 12px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500;
      text-align: center; border: none; cursor: pointer; transition: var(--transition);
      text-decoration: none;
    }
    .detail-action-btn:active { transform: scale(0.95); }
    .detail-btn-primary { background: var(--brand); color: #fff; }
    .detail-btn-primary:hover { background: var(--brand-dark); }
    .detail-btn-secondary { background: var(--bg); color: var(--text-secondary); }
    .detail-btn-secondary:hover { background: var(--border); }
    .detail-btn-fav { background: var(--brand-light); color: var(--brand); }
    .detail-btn-fav.active { background: var(--brand); color: #fff; }

    /* View Toggle */
    .view-toggle { display: flex; gap: 8px; margin-bottom: 14px; }
    .view-btn {
      flex: 1; text-align: center; padding: 10px; border-radius: var(--radius-sm);
      background: var(--bg); color: var(--text-secondary); font-size: 13px; font-weight: 500;
      cursor: pointer; border: 1.5px solid var(--border); transition: var(--transition);
    }
    .view-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }
    #map-container { display: none; height: calc(100vh - 220px); min-height: 400px; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); margin-bottom: 12px; }
    #map-container.show { display: block; animation: fadeIn 0.3s ease; }
    #list-container-wrapper { display: none; }
    #list-container-wrapper.show { display: block; }

    /* Google Maps Embed */
    .google-map-embed {
      width: 100%; height: 100%; border: none;
    }

    /* Settings */
    .setting-label { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip-excluded { background: var(--accent-red) !important; color: #fff !important; border-color: var(--accent-red) !important; }
    .price-options { display: flex; gap: 10px; }
    .price-btn { flex: 1; text-align: center; padding: 12px; border-radius: var(--radius-sm); background: var(--bg); font-size: 13px; font-weight: 500; cursor: pointer; transition: var(--transition); }
    .price-btn.active { background: var(--brand); color: #fff; }

    /* Location Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 500;
      display: none; align-items: flex-end; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.show { display: flex; }
    .modal-content {
      background: var(--card); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px;
      max-height: 70vh; overflow-y: auto; padding: 20px;
      animation: slideUp 0.3s ease;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .modal-title { font-size: 18px; font-weight: 600; }
    .modal-close { font-size: 20px; cursor: pointer; color: var(--text-muted); padding: 6px; border-radius: 50%; }
    .modal-close:hover { background: var(--bg); }
    .location-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 0; border-bottom: 1px solid var(--border-light); cursor: pointer;
      transition: var(--transition);
    }
    .location-item:hover { background: var(--bg); margin: 0 -20px; padding-left: 20px; padding-right: 20px; }
    .location-item:last-child { border-bottom: none; }
    .location-item-name { font-size: 15px; font-weight: 500; }
    .location-item-sub { font-size: 12px; color: var(--text-muted); }
    .location-item.active .location-item-name { color: var(--brand); font-weight: 600; }
    .add-location {
      display: flex; align-items: center; gap: 10px; padding: 14px 0;
      color: var(--brand); font-size: 15px; font-weight: 500; cursor: pointer;
    }
    .add-icon { font-size: 18px; font-weight: 600; }

    /* Add Location Form */
    .add-form { margin-top: 12px; padding: 14px; background: var(--bg); border-radius: 12px; display: none; }
    .add-form.show { display: block; }
    .add-form input {
      width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-xs);
      margin-bottom: 10px; font-size: 14px; background: var(--card); transition: var(--transition);
    }
    .add-form input:focus { border-color: var(--brand); outline: none; box-shadow: 0 0 0 2px var(--brand-glow); }
    .add-form-btns { display: flex; gap: 8px; }
    .add-form-btns button { flex: 1; padding: 12px; border-radius: var(--radius-xs); border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: var(--transition); }
    .btn-save { background: var(--brand); color: #fff; }
    .btn-cancel { background: var(--bg); color: var(--text-secondary); }

    /* Toast */
    .toast {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.78); color: #fff; padding: 14px 22px;
      border-radius: 12px; font-size: 14px; z-index: 1000; opacity: 0;
      transition: opacity 0.2s; pointer-events: none; font-weight: 500;
    }
    .toast.show { opacity: 1; }

    /* Empty / Loading */

  <script>
    // ========== Configuration ==========
    // Google Maps API Key (free tier: 28,000 map loads/month)

    const GOOGLE_MAPS_API_KEY = ''; // Add your key here

    const CUISINE_MAP = {
      'chinese': { label: '中式', symbol: '⊞' },
      'japanese': { label: '日式', symbol: '⊞' },
      'korean': { label: '韓式', symbol: '⊞' },

      'burger': { label: '漢堡', symbol: '⊞' },
      'sandwich': { label: '三文治', symbol: '⊞' },
      'noodles': { label: '麵食', symbol: '⊞' },

      'coffee_shop': { label: '咖啡', symbol: '☕' },
      'cake': { label: '甜品', symbol: '⊞' },
      'regional': { label: '地方菜', symbol: '⊞' },
      'asian': { label: '亞洲', symbol: '⊞' },
      'western': { label: '西式', symbol: '⊞' },
    };

    const DEFAULT_LOCATIONS = [
      { id: 'default_central', label: '中環', lat: 22.2810, lng: 114.1580, isDefault: true },
      { id: 'default_tst', label: '尖沙咀', lat: 22.2990, lng: 114.1730, isDefault: false },
      { id: 'default_cwb', label: '銅鑼灣', lat: 22.2790, lng: 114.1830, isDefault: false },
    ];

    // ========== Storage ==========
    const Store = {
      get(k, def) { try { const v = localStorage.getItem('lg_' + k); return v ? JSON.parse(v) : def; } catch { return def; } },
      set(k, v) { try { localStorage.setItem('lg_' + k, JSON.stringify(v)); } catch {} },
      getFavorites() { return this.get('favorites', []); },
      toggleFav(r) {
        let favs = this.getFavorites();
        const idx = favs.findIndex(f => f.id === r.id);
        if (idx >= 0) { favs.splice(idx, 1); } else { favs.push({ id: r.id, name: r.name, cuisine: r.cuisine, lat: r.lat, lng: r.lng, favorited_at: Date.now() }); }
        this.set('favorites', favs);
        return idx < 0;
      },
      isFav(id) { return this.getFavorites().some(f => f.id === id); },
      getPrefs() { return this.get('prefs', { favorite_cuisines: [], excluded_cuisines: [], radius: 1000, quick_pick_mode: 'smart_mix' }); },
      setPrefs(p) { this.set('prefs', p); },
      getHistory() { return this.get('history', []); },
      addHistory(id) { let h = this.getHistory(); h.unshift({ id, timestamp: Date.now() }); if (h.length > 50) h.length = 50; this.set('history', h); },
      getLocations() { let locs = this.get('locations', null); if (!locs) { locs = DEFAULT_LOCATIONS; this.set('locations', locs); } return locs; },
      saveLocations(locs) { this.set('locations', locs); },
      getCurrentLocation() { return this.get('currentLocation', null); },
      setCurrentLocation(loc) { this.set('currentLocation', loc); },
      getRestaurantsCache() { return this.get('restaurantCache', null); },
      setRestaurantsCache(data) { this.set('restaurantCache', { ...data, cachedAt: Date.now() }); },
    };

    // ========== State ==========
    let state = {
      budget: 30, mode: 'strict', selectedCuisines: [], qpMode: 'smart_mix',
      recommendation: null, currentRest: null, favSort: 'recent',
      restaurants: [], currentLocation: null, loading: false,
      mapView: 'list', map: null, mapMarkers: [], userMarker: null,
      cuisineColors: {
        'chinese': '#E74C3C', 'japanese': '#E91E63', 'korean': '#9B59B6',
        'thai': '#FF9800', 'italian': '#4CAF50', 'mexican': '#FF5722',
        'indian': '#FFC107', 'vietnamese': '#00BCD4', 'seafood': '#2196F3',
        'steak_house': '#795548', 'pizza': '#FF5722', 'burger': '#F44336',
        'sandwich': '#8BC34A', 'noodles': '#FF9800', 'sushi': '#E91E63',
        'coffee_shop': '#795548', 'cake': '#E91E63', 'regional': '#607D8B',
        'asian': '#FF9800', 'western': '#4CAF50', 'other': '#9E9E9E',
      },
      sortBy: 'distance',
      searchQuery: '',
    };

    // ========== Haversine ==========
    function haversine(lat1, lng1, lat2, lng2) {
      const R = 6371000; const dLat = (lat2 - lat1) * Math.PI / 180; const dLng = (lng2 - lat1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    function formatDist(m) { return m < 1000 ? Math.round(m) + 'm' : (m/1000).toFixed(1) + 'km'; }

    // ========== Cuisine Mapping ==========
    function mapCuisine(raw) { if (!raw) return 'other'; const lower = raw.toLowerCase(); for (const key of Object.keys(CUISINE_MAP)) { if (lower.includes(key)) return key; } return 'other'; }
    function cuisineDisplay(raw) { const key = mapCuisine(raw); const info = CUISINE_MAP[key]; return info ? info.label : raw || '其他'; }
    function restName(r) { return r.name_tc || r.name || r.name_en || '未知餐廳'; }
    function restNameSub(r) { const tc = r.name_tc; const en = r.name_en; if (tc && en) return en; if (!tc && r.name && en && r.name !== en) return en; return ''; }

    // ========== Opening Hours Logic ==========
    function isOpenNow(hoursStr) {
      if (!hoursStr) return null;
      const now = new Date();
      const day = now.getDay(); // 0=Sun, 1=Mon, ...
      const hours = now.getHours();
      const minutes = now.getMinutes();
      const currentTime = hours * 60 + minutes;

      // Simple parsing for common formats
      // "Mo-Fr 09:00-18:00; Sa 10:00-15:00"
      const dayMap = { 'Su': 0, 'Mo': 1, 'Tu': 2, 'We': 3, 'Th': 4, 'Fr': 5, 'Sa': 6 };

      // Try to find a matching day range
      const parts = hoursStr.split(';');
      for (const part of parts) {
        const trimmed = part.trim();
        // Match day ranges like "Mo-Fr 09:00-18:00" or single day "Sa 10:00-15:00"
        const match = trimmed.match(/^(?:Mo|Tu|We|Th|Fr|Sa|Su)(?:-(?:Mo|Tu|We|Th|Fr|Sa|Su))?\s+(\d{1,2}):(\d{2})-(\d{1,2}):(\d{2})$/);
        if (match) {
          const openTime = parseInt(match[1]) * 60 + parseInt(match[2]);
          const closeTime = parseInt(match[3]) * 60 + parseInt(match[4]);
          // Check if current day falls within the day range
          const dayPart = trimmed.match(/^((?:Mo|Tu|We|Th|Fr|Sa|Su)(?:-(?:Mo|Tu|We|Th|Fr|Sa|Su))?)/);
          if (dayPart) {
            const dayRange = dayPart[1];
            if (dayRange.includes('-')) {
              const [startDay, endDay] = dayRange.split('-');
              const start = dayMap[startDay];
              const end = dayMap[endDay];
              if (day >= start && day <= end) {
                return currentTime >= openTime && currentTime < closeTime;
              }
            } else {
              const singleDay = dayMap[dayRange];
              if (day === singleDay) {
                return currentTime >= openTime && currentTime < closeTime;
              }
            }
          }
        }
      }
      return null; // Could not parse
    }

    function formatHours(hoursStr) {
      if (!hoursStr) return '營業時間未提供';
      // Simplify common formats
      return hoursStr.replace(/;/g, ' · ').replace(/\s+/g, ' ').trim();
    }

    // ========== Price Level ==========
    function getPriceLevel(r) {
      // Estimate price level from cuisine type and amenity
      const amenity = r.amenity || '';
      const cuisine = (r.cuisine || '').toLowerCase();

      if (amenity === 'fast_food' || amenity === 'cafe') return 1;
      if (cuisine.includes('fine_dining') || cuisine.includes('michelin')) return 3;
      if (cuisine.includes('japanese') && cuisine.includes('sushi')) return 2;
      if (cuisine.includes('western') || cuisine.includes('italian')) return 2;
      if (cuisine.includes('chinese') && cuisine.includes('dim_sum')) return 1;

      return 1; // Default to affordable
    }

    function formatPrice(level) {
      return '$'.repeat(level);
    }

    function getPriceColor(level) {
      switch (level) {
        case 1: return '#2e7d32';
        case 2: return '#f57c00';
        case 3: return '#c62828';
        default: return '#666';
      }
    }

    // ========== Rating (simulated) ==========
    function getRating(r) {
      // Simulate rating based on available data
      // In production, this would come from Google Places API or other source
      const base = 3.5 + Math.random() * 1.5;
      return Math.round(base * 10) / 10;
    }

    function getReviewCount(r) {
      // Simulate review count
      return Math.floor(10 + Math.random() * 500);
    }

    // ========== Location ==========
    function showLocationModal() {
      const locs = Store.getLocations(); const current = Store.getCurrentLocation();
      document.getElementById('location-list').innerHTML = locs.map(l =>
        '<div class="location-item ' + (current && current.id === l.id ? 'active' : '') + '" onclick="selectLocation(\'' + l.id + '\')">' +
        '<div><div class="location-item-name">' + l.label + '</div><div class="location-item-sub">' + l.lat.toFixed(4) + ', ' + l.lng.toFixed(4) + '</div></div>' +
        (l.id.startsWith('default_') ? '' : '<span style="color:var(--accent-red);font-size:12px;" onclick="event.stopPropagation();deleteLocation(\'' + l.id + '\')">刪除</span>') + '</div>'
      ).join('');
      document.getElementById('location-modal').classList.add('show');
    }
    function hideLocationModal() { document.getElementById('location-modal').classList.remove('show'); document.getElementById('add-form').classList.remove('show'); }
    function closeModal(e) { if (e.target.classList.contains('modal-overlay')) hideLocationModal(); }
    function selectLocation(id) { const locs = Store.getLocations(); const loc = locs.find(l => l.id === id); if (!loc) return; Store.setCurrentLocation(loc); state.currentLocation = loc; updateLocationDisplay(); hideLocationModal(); loadRestaurants(); }
    function deleteLocation(id) { Store.saveLocations(Store.getLocations().filter(l => l.id !== id)); showLocationModal(); }
    function toggleAddForm() { document.getElementById('add-form').classList.toggle('show'); }
    function saveLocation() {
      const name = document.getElementById('loc-name').value.trim(); const lat = parseFloat(document.getElementById('loc-lat').value); const lng = parseFloat(document.getElementById('loc-lng').value);
      if (!name || isNaN(lat) || isNaN(lng)) return toast('請填寫完整信息');
      const locs = Store.getLocations(); const newLoc = { id: 'loc_' + Date.now(), label: name, lat, lng, isDefault: false };
      locs.push(newLoc); Store.saveLocations(locs); Store.setCurrentLocation(newLoc); state.currentLocation = newLoc;
      updateLocationDisplay(); hideLocationModal(); loadRestaurants();
      document.getElementById('loc-name').value = ''; document.getElementById('loc-lat').value = ''; document.getElementById('loc-lng').value = '';
    }
    function useGPS() {
      if (!navigator.geolocation) return toast('瀏覽器不支援定位');
      toast('正在獲取位置...');
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const loc = { id: 'gps', label: '目前位置', lat: pos.coords.latitude, lng: pos.coords.longitude };
          Store.setCurrentLocation(loc); state.currentLocation = loc; updateLocationDisplay(); hideLocationModal(); loadRestaurants(); toast('定位成功');
        },
        () => toast('定位失敗，請手動選擇地點'),
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }
    function refreshLocation() { const loc = state.currentLocation; if (!loc) return; if (loc.id === 'gps') useGPS(); else loadRestaurants(); }
    function updateLocationDisplay() {
      const loc = state.currentLocation; if (!loc) return;
      document.getElementById('loc-display-name').textContent = loc.label;
      const cache = Store.getRestaurantsCache();
      if (cache && cache.locId === loc.id) {
        const age = Math.round((Date.now() - cache.cachedAt) / 60000);
        const sourceLabel = cache.source === 'overpass-live' ? 'OSM' : (cache.source || '').startsWith('pre-processed') ? 'FEHD+OSM' : '快取';
        document.getElementById('loc-display-sub').textContent = cache.count + ' 家 · ' + age + '分鐘前 · ' + sourceLabel;
      } else { document.getElementById('loc-display-sub').textContent = ''; }
    }

    // ========== Restaurant Database ==========
    const DATA_URL = 'data/hk_restaurants.json';

    async function loadRestaurants() {
      if (state.loading) return; const loc = state.currentLocation; if (!loc) { document.getElementById('list-container').innerHTML = '<div class="empty">請先選擇地點</div>'; return; }
      state.loading = true; document.getElementById('list-container').innerHTML = '<div class="loading"><div class="loading-spinner"></div><br>載入餐廳...</div>';
      const prefs = Store.getPrefs(); const radius = prefs.radius || 1000;

      // Try cache first (24h freshness)
      const cache = Store.getRestaurantsCache();
      if (cache && cache.locId === loc.id && (Date.now() - cache.cachedAt) < 24 * 3600 * 1000) {
        state.restaurants = filterByRadius(cache.restaurants, loc, radius);
        state.restaurants = state.restaurants.map(r => ({ ...r, distance: haversine(loc.lat, loc.lng, r.lat, r.lng), timeToTable: estimateTime(r) }));
        state.loading = false; updateLocationDisplay(); renderList(); if (state.mapView === 'map' && state.map) renderMapMarkers(); return;
      }

      let restaurants = [];
      let dataSource = '';

      // Strategy 1: Load pre-processed JSON
      try {
        const resp = await fetch(DATA_URL + '?_t=' + Date.now());
        if (resp.ok) {
          const data = await resp.json();
          if (data && data.restaurants && data.restaurants.length > 0) {
            restaurants = data.restaurants.filter(r => r.lat && r.lng);
            dataSource = 'pre-processed (' + data.total + ' total, ' + restaurants.length + ' with coords)';
            console.log('[LunchGo] Loaded pre-processed data:', dataSource);
          }
        }
      } catch (e) {
        console.log('[LunchGo] Pre-processed JSON not available:', e.message);
      }

      // Strategy 2: Fall back to Overpass API
      if (restaurants.length === 0) {
        console.log('[LunchGo] Falling back to Overpass API...');
        try {
          const query = '[out:json][timeout:25];(nwr(around:' + radius + ',' + loc.lat + ',' + loc.lng + ')["amenity"="restaurant"];nwr(around:' + radius + ',' + loc.lat + ',' + loc.lng + ')["amenity"="fast_food"];nwr(around:' + radius + ',' + loc.lat + ',' + loc.lng + ')["amenity"="cafe"];nwr(around:' + radius + ',' + loc.lat + ',' + loc.lng + ')["amenity"="food_court"];);out center qt;';
          const endpoints = ['https://overpass-api.de/api/interpreter', 'https://overpass.openstreetmap.fr/api/interpreter'];
          let resp = null;
          for (const ep of endpoints) {
            try {
              resp = await fetch(ep, {
                method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'data=' + encodeURIComponent(query),
              });
              if (resp.ok) break;
            } catch (_) { resp = null; }
          }
          if (!resp || !resp.ok) throw new Error('All Overpass endpoints failed');
          const data = await resp.json();
          for (const elem of (data.elements || [])) {
            const tags = elem.tags || {}; const name = tags['name:zh'] || tags.name; if (!name) continue;
            restaurants.push({
              id: 'osm_' + elem.id + (elem.type === 'way' ? 'w' : elem.type === 'relation' ? 'r' : ''),
              name: name, name_en: tags['name:en'] || '',
              name_tc: tags['name:zh'] || tags['name:zh-Hant'] || '',
              lat: elem.lat || (elem.center && elem.center.lat) || 0,
              lng: elem.lon || (elem.center && elem.center.lon) || 0,
              cuisine: tags.cuisine || '', phone: tags.phone || tags['contact:phone'] || '',
              website: tags.website || tags['contact:website'] || '',
              address: tags['addr:full'] || tags['addr:street'] || '',
              opening_hours: tags.opening_hours || '', amenity: tags.amenity || 'restaurant',
              operator: tags.operator || '', brand: tags.brand || '',
              district: '', district_tc: '',
              source: 'overpass_live',
            });
          }
          dataSource = 'overpass-live';
          console.log('[LunchGo] Loaded from Overpass:', restaurants.length);
        } catch (e) {
          console.error('[LunchGo] Overpass also failed:', e);
        }
      }

      // Handle total failure
      if (restaurants.length === 0) {
        if (cache) {
          state.restaurants = filterByRadius(cache.restaurants, loc, radius).map(r => ({ ...r, distance: haversine(loc.lat, loc.lng, r.lat, r.lng), timeToTable: estimateTime(r) }));
          document.getElementById('list-container').innerHTML = '<div class="empty" style="color:#e67e22;">網路連線不佳，顯示離線資料</div>';
        } else {
          state.restaurants = [];
          document.getElementById('list-container').innerHTML = '<div class="empty">無法取得餐廳資料，請稍後再試</div>';
        }
        state.loading = false; updateLocationDisplay(); return;
      }

      // Filter by radius and process
      state.restaurants = filterByRadius(restaurants, loc, radius).map(r => ({ ...r, distance: haversine(loc.lat, loc.lng, r.lat, r.lng), timeToTable: estimateTime(r) }));
      Store.setRestaurantsCache({ locId: loc.id, restaurants: state.restaurants, count: state.restaurants.length, source: dataSource });
      updateLocationDisplay(); renderList(); if (state.mapView === 'map' && state.map) renderMapMarkers();
      state.loading = false;
    }

    function filterByRadius(restaurants, loc, radius) {
      return restaurants.filter(r => {
        if (!r.lat || !r.lng) return false;
        return haversine(loc.lat, loc.lng, r.lat, r.lng) <= radius;
      });
    }

    function estimateTime(r) {
      const walkSpeed = 80; const walkTime = Math.round(r.distance / walkSpeed);
      let prepTime;
      switch (r.amenity) {
        case 'fast_food': prepTime = 5 + Math.random() * 5; break;
        case 'cafe': prepTime = 3 + Math.random() * 5; break;
        default: prepTime = 10 + Math.random() * 15; break;
      }
      const queueWait = r.amenity === 'fast_food' ? Math.random() * 5 : 5 + Math.random() * 15;
      return Math.round(walkTime + prepTime + queueWait);
    }

    // ========== Quick Pick ==========
    function doQuickPick() {
      const loc = state.currentLocation; if (!loc) return toast('請先選擇地點');
      if (state.restaurants.length === 0) { loadRestaurants().then(() => doQuickPick()); return; }
      const prefs = Store.getPrefs(); const favs = Store.getFavorites(); const history = Store.getHistory();
      const maxTime = state.mode === 'strict' ? state.budget : state.budget * 1.5;
      let cands = state.restaurants.filter(r => {
        if (r.timeToTable > maxTime) return false;
        const ck = mapCuisine(r.cuisine);
        if (prefs.excluded_cuisines.includes(ck)) return false;
        if (state.selectedCuisines.length > 0 && !state.selectedCuisines.includes(ck)) return false;
        if (state.qpMode === 'favorites_only') return favs.some(f => f.id === r.id);
        if (state.qpMode === 'try_new') { const recent = history.slice(0, 5).map(h => h.id); if (recent.includes(r.id) || favs.some(f => f.id === r.id)) return false; }
        return true;
      });
      if (cands.length === 0) cands = state.restaurants.slice(0, 5);
      const scored = cands.map(r => {
        let score = 0;
        if (favs.some(f => f.id === r.id)) score += 30;
        const ck = mapCuisine(r.cuisine); if (prefs.favorite_cuisines.includes(ck)) score += 15;
        score += Math.max(0, 50 - r.timeToTable); score += Math.random() * 10;
        return { ...r, score };
      });
      scored.sort((a, b) => b.score - a.score);
      const top3 = scored.slice(0, Math.min(3, scored.length));
      const total = top3.reduce((s, r) => s + r.score, 0); let rand = Math.random() * total; let pick = top3[0];
      for (const c of top3) { rand -= c.score; if (rand <= 0) { pick = c; break; } }
      const reasons = [];
      if (prefs.favorite_cuisines.includes(mapCuisine(pick.cuisine))) reasons.push('符合你的口味');
      if (pick.timeToTable <= 20) reasons.push('距離近');
      if (pick.amenity === 'fast_food') reasons.push('出餐快');
      if (reasons.length === 0) reasons.push('值得一試');
      state.recommendation = pick;
      document.getElementById('rec-name').textContent = restName(pick);
      document.getElementById('rec-cuisine').textContent = cuisineDisplay(pick.cuisine);
      document.getElementById('rec-distance').textContent = formatDist(pick.distance);
      document.getElementById('rec-time').textContent = pick.timeToTable + '分鐘';
      document.getElementById('rec-reason').textContent = reasons.join('，');
      document.getElementById('rec-address').textContent = pick.address || '';
      updateHeart(); document.getElementById('rec-section').style.display = 'block';
    }
    function acceptPick() {
      const r = state.recommendation; if (!r) return;
      Store.addHistory(r.id);
      const prefs = Store.getPrefs(); prefs.cuisine_weights = prefs.cuisine_weights || {};
      const ck = mapCuisine(r.cuisine); prefs.cuisine_weights[ck] = Math.min(1, (prefs.cuisine_weights[ck] || 0.5) + 0.1);
      Store.setPrefs(prefs); toast('已記錄你的選擇');

    function toggleFav() { const r = state.recommendation; if (!r) return; const added = Store.toggleFav(r); updateHeart(); updateFavCard(); toast(added ? '已收藏' : '已取消收藏'); }
    function updateHeart() { const h = document.getElementById('rec-heart'); if (state.recommendation && Store.isFav(state.recommendation.id)) h.classList.add('active'); else h.classList.remove('active'); }
    function updateFavCard() {

    // ========== Search ==========
    function handleSearch(query) {

    // ========== Sort ==========

    function setSort(sortBy) {
      state.sortBy = sortBy;

      });

    // Close sort dropdown on outside click
    document.addEventListener('click', (e) => {

      }

    // ========== List ==========
    function getSortedList() {
      let list = [...state.restaurants];

      // Apply search filter
      if (state.searchQuery) {
        list = list.filter(r => {
          const name = (r.name_tc || r.name || r.name_en || '').toLowerCase();
          const nameEn = (r.name_en || '').toLowerCase();
          const cuisine = (r.cuisine || '').toLowerCase();
          const address = (r.address || r.address_tc || '').toLowerCase();
          return name.includes(state.searchQuery) || nameEn.includes(state.searchQuery) || cuisine.includes(state.searchQuery) || address.includes(state.searchQuery);
        });
      }

      // Apply cuisine filter
      const prefs = Store.getPrefs();
      list = list.filter(r => {
        const ck = mapCuisine(r.cuisine);
        if (prefs.excluded_cuisines.includes(ck)) return false;
        if (state.selectedCuisines.length > 0 && !state.selectedCuisines.includes(ck)) return false;
        return true;
      });

      // Apply sort
      switch (state.sortBy) {
        case 'distance': list.sort((a, b) => a.distance - b.distance); break;
        case 'rating': list.sort((a, b) => getRating(b) - getRating(a)); break;
        case 'price': list.sort((a, b) => getPriceLevel(a) - getPriceLevel(b)); break;
        case 'name': list.sort((a, b) => (restName(a) || '').localeCompare(restName(b) || '', 'zh')); break;
      }

      return list;
    }

        if (amenityTag) tags += amenityTag;

          '<div class="rest-card-content">' +

                (nameEn ? '<div class="rest-card-name-en">' + nameEn + '</div>' : '') +

    // ========== Map View ==========

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM', maxZoom: 19 }).addTo(state.map);

            const userIcon = L.divIcon({ className: '',
              html: '<div style="position:relative;width:24px;height:24px;">' +
                '<div style="position:absolute;width:24px;height:24px;background:rgba(7,193,96,0.2);border-radius:50%;animation:pulse-marker 2s infinite;"></div>' +
                '<div style="position:absolute;top:4px;left:4px;width:16px;height:16px;background:#07C160;border:3px solid #fff;border-radius:50%;box-shadow:0 0 6px rgba(0,0,0,0.3);"></div></div>',
              iconSize: [24, 24], iconAnchor: [12, 12],
            });
            state.userMarker = L.marker([loc.lat, loc.lng], { icon: userIcon, zIndexOffset: 1000 }).addTo(state.map);
            state.userMarker.bindPopup('<div class="user-location-label">⬤ 你的位置</div>', { closeButton: false });
            renderMapMarkers();
          };
          document.head.appendChild(leafletJS);
        }
      }
    }

    function getFilteredRestaurants() {
      return getSortedList();
    }

    function renderMapMarkers() {
      if (!state.map) return;
      // Only works with Leaflet
      if (state.map instanceof L.Map) {
        state.mapMarkers.forEach(m => state.map.removeLayer(m)); state.mapMarkers = [];
        const filtered = getFilteredRestaurants();
        filtered.forEach(r => {
          const ck = mapCuisine(r.cuisine); const color = state.cuisineColors[ck] || state.cuisineColors['other'];
          const isFav = Store.isFav(r.id);
          const markerIcon = L.divIcon({ className: '',
            html: '<div style="width:28px;height:28px;background:' + color + ';border:3px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.3);"></div>',
            iconSize: [28, 28], iconAnchor: [14, 14],
          });
          const marker = L.marker([r.lat, r.lng], { icon: markerIcon }).addTo(state.map);
          const popupContent = '<div class="map-popup">' +
            '<div class="map-popup-name">' + restName(r) + '</div>' +
            '<div class="map-popup-info">' + cuisineDisplay(r.cuisine) + ' · ' + formatDist(r.distance) + ' · 約' + r.timeToTable + '分鐘</div>' +
            '<div class="map-popup-btns">' +
            '<button class="map-btn-fav ' + (isFav ? 'is-fav' : '') + '" data-popup-fav-id="' + r.id + '">' + (isFav ? '♥ 已收藏' : '♡ 收藏') + '</button>' +
            '<button class="map-btn-detail" data-popup-detail-id="' + r.id + '">詳情</button></div></div>';
          marker.bindPopup(popupContent, { maxWidth: 220 });
          marker._restData = r; state.mapMarkers.push(marker);
        });

        // Attach popup button listeners
        state.map.on('popupopen', (e) => {
          const popup = e.popup.getElement();
          if (popup) {
            popup.querySelectorAll('[data-popup-fav-id]').forEach(btn => {
              btn.addEventListener('click', (ev) => {
                ev.stopPropagation();
                const id = btn.dataset.popupFavId;
                const r = state.restaurants.find(x => x.id === id);
                if (r) {
                  const added = Store.toggleFav(r);
                  updateFavCard();
                  renderMapMarkers();
                  toast(added ? '已收藏' : '已取消收藏');
                }
              });
            });
            popup.querySelectorAll('[data-popup-detail-id]').forEach(btn => {
              btn.addEventListener('click', (ev) => {
                ev.stopPropagation();
                const id = btn.dataset.popupDetailId;
                const r = state.restaurants.find(x => x.id === id);
                if (r) {
                  state.map.closePopup();
                  showDetail(r);
                }
              });
            });
          }
        });
      }
    }

    // ========== Cuisine Chips ==========
    function renderCuisineChips() {
      const cuisines = [
        { key: 'chinese', label: '中式' }, { key: 'japanese', label: '日式' }, { key: 'korean', label: '韓式' },
        { key: 'thai', label: '泰國' }, { key: 'italian', label: '意式' }, { key: 'indian', label: '印度' },
        { key: 'seafood', label: '海鮮' }, { key: 'burger', label: '漢堡' }, { key: 'noodles', label: '麵食' },
        { key: 'coffee_shop', label: '咖啡' },
      ];
      const savedCuisines = Store.get('cuisine_filter', []); state.selectedCuisines = savedCuisines;
      document.getElementById('cuisine-chips').innerHTML =
        '<span class="chip ' + (savedCuisines.length === 0 ? 'active' : '') + '" onclick="selectCuisine(\'all\')">全部</span>' +
        cuisines.map(c => '<span class="chip ' + (savedCuisines.includes(c.key) ? 'active' : '') + '" onclick="selectCuisine(\'' + c.key + '\')">' + c.label + '</span>').join('');
    }
    function selectCuisine(code) {
      if (code === 'all') { state.selectedCuisines = []; }
      else { const idx = state.selectedCuisines.indexOf(code); if (idx > -1) state.selectedCuisines.splice(idx, 1); else { if (state.selectedCuisines.length >= 3) return toast('最多選擇3種菜系'); state.selectedCuisines.push(code); } }
      Store.set('cuisine_filter', state.selectedCuisines); renderCuisineChips();
    }

    // ========== Toast ==========
    function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1500); }

    // ========== Init ==========
    function init() {
      const loc = Store.getCurrentLocation();
      if (loc) { state.currentLocation = loc; updateLocationDisplay(); loadRestaurants().then(() => { if (state.mapView === 'map') initMap(); }); }
      else if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const newLoc = { id: 'gps', label: '目前位置', lat: pos.coords.latitude, lng: pos.coords.longitude };
            Store.setCurrentLocation(newLoc); state.currentLocation = newLoc; updateLocationDisplay();
            loadRestaurants().then(() => { if (state.mapView === 'map') initMap(); });
          },
          () => { const locs = Store.getLocations(); const def = locs.find(l => l.isDefault) || locs[0]; Store.setCurrentLocation(def); state.currentLocation = def; updateLocationDisplay(); loadRestaurants(); },
          { enableHighAccuracy: true, timeout: 5000 }
        );
      } else { const locs = Store.getLocations(); const def = locs.find(l => l.isDefault) || locs[0]; Store.setCurrentLocation(def); state.currentLocation = def; updateLocationDisplay(); loadRestaurants(); }

      const slider = document.getElementById('budget-slider'); slider.value = Store.get('budget', 30); state.budget = parseInt(slider.value);
      document.getElementById('budget-display').textContent = state.budget + ' 分鐘';
      slider.addEventListener('input', () => { state.budget = parseInt(slider.value); document.getElementById('budget-display').textContent = state.budget + ' 分鐘'; Store.set('budget', state.budget); });

      document.getElementById('mode-toggle').querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => { document.querySelectorAll('#mode-toggle .mode-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); state.mode = btn.dataset.mode; });
      });

      const qpMode = Store.getPrefs().quick_pick_mode || 'smart_mix'; state.qpMode = qpMode;
      document.querySelectorAll('#qp-modes .qp-mode').forEach(btn => {
        if (btn.dataset.mode === qpMode) btn.classList.add('active'); else btn.classList.remove('active');
        btn.addEventListener('click', () => { document.querySelectorAll('#qp-modes .qp-mode').forEach(b => b.classList.remove('active')); btn.classList.add('active'); state.qpMode = btn.dataset.mode; const p = Store.getPrefs(); p.quick_pick_mode = btn.dataset.mode; Store.setPrefs(p); });
      });

      renderCuisineChips(); updateFavCard();
    }

    init();
  </script>
</body>
</html>
