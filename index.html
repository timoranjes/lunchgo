<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LunchGo 搵食</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>

  <!-- Header -->
  <div class="header" id="main-header">
    <div class="header-top">
      <h1>LunchGo <span>搵食</span></h1>
      <button class="fav-btn" id="fav-btn">收藏</button>
      <button class="loc-btn" id="loc-btn">中環</button>
    </div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="搜尋餐廳名稱、地址、地區..." />
      <button class="search-clear" id="search-clear">×</button>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar">
    <button class="toolbar-btn active" data-sort="distance">距離最近</button>
    <button class="toolbar-btn" data-sort="rating">評分最高</button>
    <button class="toolbar-btn" data-sort="name">名稱排序</button>
    <button class="toolbar-btn" data-sort="district">地區排序</button>
  </div>

  <!-- Cuisine Filter -->
  <div class="cuisine-bar" id="cuisine-bar"></div>

  <!-- Error Banner -->
  <div class="error-banner" id="error-banner"></div>

  <!-- Discovery Section -->
  <div class="discovery-section" id="discovery-section" style="display:none;">
    <div class="discovery-header">
      <div>
        <div class="discovery-title">好去處推薦</div>
        <div class="discovery-subtitle" id="discovery-subtitle">高分餐廳</div>
      </div>
    </div>
    <div class="discovery-scroll" id="discovery-scroll"></div>
  </div>

  <!-- List View -->
  <div class="list-container" id="list-view">
    <div class="result-count" id="result-count"></div>
    <div id="rest-list"></div>
    <div class="load-more" id="load-more" style="display:none;">
      <button id="load-more-btn">載入更多</button>
    </div>
    <div class="empty" id="empty-state" style="display:none;">找不到餐廳</div>
    <div class="loading" id="loading-state">
      <div class="loading-spinner"></div>
      <div>載入餐廳...</div>
    </div>
  </div>

  <!-- Map View -->
  <div id="map-view">
    <div class="map-tile-toggle" id="map-tile-toggle">
      <button class="active" data-tile="roadmap">地圖</button>
      <button data-tile="satellite">衛星</button>
      <button data-tile="terrain">地形</button>
      <button data-tile="hybrid">混合</button>
    </div>
    <div id="map"></div>
    <div class="map-info-panel" id="map-panel">
      <button class="close-btn" id="map-panel-close">+</button>
      <div id="map-panel-content"></div>
    </div>
  </div>

  <!-- Detail View -->
  <div class="detail-overlay" id="detail-view">
    <div class="detail-header">
      <button class="detail-back" id="detail-back"></button>
      <span style="font-weight:600;">餐廳詳情</span>
      <button class="detail-fav" id="detail-fav">&#9825;</button>
    </div>
    <div id="detail-content"></div>
  </div>

  <!-- Favorites Page -->
  <div class="fav-page" id="fav-page">
    <div class="fav-page-header">
      <button class="fav-page-back" id="fav-back"></button>
      <span class="fav-page-title">收藏餐廳</span>
    </div>
    <div class="fav-sort-bar">
      <button class="fav-sort-btn active" data-fav-sort="recent">最近添加</button>
      <button class="fav-sort-btn" data-fav-sort="name">名稱</button>
      <button class="fav-sort-btn" data-fav-sort="distance">距離</button>
    </div>
    <div class="list-container" id="fav-list-container">
      <div id="fav-list"></div>
      <div class="empty" id="fav-empty">未收藏任何餐廳</div>
    </div>
  </div>

  <!-- Location Modal -->
  <div class="modal-overlay" id="loc-modal">
    <div class="modal-content">
      <div class="modal-title">選擇地點</div>
      <div id="loc-list"></div>
      <button class="gps-btn" id="gps-btn">使用目前位置 (GPS)</button>
      <div class="custom-section">
        <div class="custom-section-title">我的地點</div>
        <div id="custom-loc-list"></div>
        <button class="gps-btn" id="add-custom-loc-btn" style="border-style:solid;font-size:13px;">+ 新增地點</button>
      </div>
    </div>
  </div>

  <!-- Add Custom Location Modal -->
  <div class="modal-overlay" id="add-loc-modal">
    <div class="modal-content">
      <div class="modal-title">新增自訂地點</div>
      <div style="margin-bottom:12px;">
        <label style="font-size:13px;font-weight:500;display:block;margin-bottom:4px;">地點名稱</label>
        <input type="text" id="custom-loc-name" placeholder="例如：公司、家、運動場..." style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;" />
      </div>
      <div style="display:flex;gap:8px;">
        <button class="gps-btn" id="custom-loc-gps" style="flex:1;margin-top:0;">使用 GPS</button>
        <button class="gps-btn" id="custom-loc-map" style="flex:1;margin-top:0;">在地圖上選點</button>
      </div>
      <button class="gps-btn" id="cancel-custom-loc" style="margin-top:8px;border-style:solid;color:var(--text-secondary);border-color:var(--border);">取消</button>
    </div>
  </div>

  <!-- Random Pick Modal -->
  <div class="random-overlay" id="random-overlay">
    <div class="random-card">
      <div class="random-header" style="position:relative;">
        <button class="random-close" id="random-close">×</button>
        <h2>今天吃什麼？</h2>
        <p id="random-subtitle">讓我幫你決定！</p>
      </div>
      <div id="random-body">
        <div class="random-rolling">
          <div class="random-rolling-name" id="random-rolling-name">...</div>
        </div>
      </div>
      <div id="random-footer" style="display:none;">
        <div class="random-result">
          <div class="random-result-name" id="random-result-name"></div>
          <div class="random-result-detail" id="random-result-detail"></div>
          <div class="random-result-rating" id="random-result-rating"></div>
        </div>
        <div class="random-actions">
          <button class="action-btn action-btn-secondary" id="random-reroll">再選一次</button>
          <button class="action-btn action-btn-primary" id="random-view">查看詳情</button>
        </div>
      </div>
    </div>
  </div>

  <!-- View Toggle -->
  <div class="view-toggle" id="view-toggle">
    <button class="view-btn active" data-view="list">列表</button>
    <button class="view-btn" data-view="map">地圖</button>
  </div>

  <!-- Random Pick Button -->
  <button class="random-pick-btn" id="random-pick-btn">今天吃什麼</button>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Google Maps + Places -->
  <script src="https://maps.googleapis.com/maps/api/js?key=***&libraries=places&language=zh-TW&region=HK"></script>

  <script type="module">
    import Store from './src/store.js';
    import { haversine, formatDist, renderStars, priceLevel, escHtml, escAttr, matchCuisine } from './src/utils.js';
    import { loadPlacesDataLegacy, fetchPlaceDetailsLegacy, fetchPhotosForTopRestaurantsLegacy } from './src/api.js';

    // -- Config --
    const GOOGLE_MAPS_API_KEY = 'YOUR_API_KEY_HERE';
    // Google Places only - no local district data needed

    // Expanded cuisine filter options
    const CUISINES = [
      { id: 'all', label: '全部' },
      { id: 'chinese', label: '中式' },
      { id: 'noodle', label: '粉麵' },
      { id: 'mixian', label: '米線' },
      { id: 'japanese', label: '日式' },
      { id: 'western', label: '西式' },
      { id: 'fast_food', label: '快餐' },
      { id: 'cafe', label: '咖啡' },
      { id: 'seafood', label: '海鮮' },
      { id: 'korean', label: '韓式' },
      { id: 'thai', label: '泰式' },
      { id: 'italian', label: '意式' },
      { id: 'bbq', label: '燒烤' },
      { id: 'hotpot', label: '火鍋' },
      { id: 'dessert', label: '甜品' },
    ];

    // Default HK locations
    const DEFAULT_LOCATIONS = [
      { id: 'central', label: '中環', lat: 22.2808, lng: 114.1588, isDefault: true },
      { id: 'causeway_bay', label: '銅鑼灣', lat: 22.2783, lng: 114.1825 },
      { id: 'mong_kok', label: '旺角', lat: 22.3193, lng: 114.1694 },
      { id: 'tsim_sha_tsui', label: '尖沙咀', lat: 22.2977, lng: 114.1728 },
      { id: 'quarry_bay', label: '鰂魚涌', lat: 22.2855, lng: 114.2158 },
    ];

    // -- State --
    const state = {
      placesData: [],
      filtered: [],
      currentLocation: null,
      currentLocationLabel: '',
      currentSort: 'distance',
      searchQuery: '',
      currentView: 'list',
      activeCuisine: 'all',
      map: null,
      markers: [],
      placesService: null,
      placesLoaded: false,
      geocoder: null,
      autocomplete: null,
      // Random pick state
      randomPickResult: null,
      // Discovery state
      discoveryVisible: false,
      // Load-more pagination state
      loadMoreIndex: 0,
      loadMoreStep: 50,
      // Loading errors
      loadingErrors: [],
    };

    // -- Storage -- (imported from src/store.js)
    // -- Utils -- (imported from src/utils.js)

    // -- Data Loading (Google Places) -- (imported from src/api.js)
    // loadPlacesDataLegacy, fetchPlaceDetailsLegacy, fetchPhotosForTopRestaurantsLegacy

    /**
     * Load Places data for the current location.
     * Delegates to src/api.js with error banner handling.
     */
    async function loadPlacesData(loc) {
      if (!state.placesService || state.placesLoaded) return;
      await loadPlacesDataLegacy(state, loc, () => {
        updateDisplay();
      }, (errorMsg) => {
        console.error('[LunchGo] Places nearbySearch failed:', errorMsg);
        const banner = document.getElementById('error-banner');
        banner.textContent = '載入餐廳資料失敗：' + errorMsg;
        banner.classList.add('show');
        setTimeout(() => banner.classList.remove('show'), 5000);
      });
    }

    /**
     * Fetch photos for top restaurants.
     * Delegates to src/api.js.
     */
    function fetchPhotosForTopRestaurants(places) {
      fetchPhotosForTopRestaurantsLegacy(places, state, () => {
        updateDisplay();
      });
    }

    /**
     * Fetch place details by place_id.
     * Delegates to src/api.js.
     */
    function fetchPlaceDetails(placeId, callback) {
      fetchPlaceDetailsLegacy(state, placeId, callback);
    }

    async function loadRestaurants() {
      const loc = state.currentLocation;
      if (!loc) return;

      document.getElementById('loading-state').style.display = 'block';
      document.getElementById('rest-list').innerHTML = '';
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('load-more').style.display = 'none';
      document.getElementById('error-banner').classList.remove('show');

      // Reset and load Places data
      state.placesData = [];
      state.placesLoaded = false;
      await loadPlacesData(loc);
    }

    function updateDisplay(reset) {
      if (reset === undefined) reset = true;

      let list = state.placesData;

      // Filter by search
      if (state.searchQuery) {
        const q = state.searchQuery.toLowerCase();
        list = list.filter(r =>
          (r.name && r.name.toLowerCase().includes(q)) ||
          (r.name_en && r.name_en.toLowerCase().includes(q)) ||
          (r.address && r.address.toLowerCase().includes(q)) ||
          (r.cuisine && r.cuisine.toLowerCase().includes(q))
        );
      }

      // Filter by cuisine
      if (state.activeCuisine !== 'all') {
        list = list.filter(r => matchCuisine(r, state.activeCuisine));
      }

      // Add distance
      const loc = state.currentLocation;
      if (loc) {
        list = list.map(r => ({
          ...r,
          distance: haversine(loc.lat, loc.lng, parseFloat(r.lat), parseFloat(r.lng))
        }));
      }

      // Sort
      switch (state.currentSort) {
        case 'distance': list.sort((a, b) => (a.distance || 0) - (b.distance || 0)); break;
        case 'rating': list.sort((a, b) => (b.rating || 0) - (a.rating || 0)); break;
        case 'name': list.sort((a, b) => (a.name || '').localeCompare(b.name || '')); break;
      }

      state.filtered = list;

      // Update count
      const total = list.length;
      document.getElementById('result-count').textContent = total + ' 家餐廳';

      // Render
      if (reset) {
        state.loadMoreIndex = 0;
      }
      renderDiscovery(list);
      renderList(list);
      if (state.map) renderMapMarkers(list);

      // Hide loading
      document.getElementById('loading-state').style.display = 'none';
      if (list.length === 0 && total > 0) {
        document.getElementById('empty-state').style.display = 'block';
      } else {
        document.getElementById('empty-state').style.display = 'none';
      }
    }

    // -- Discovery / Recommendations --
    function renderDiscovery(list) {
      const section = document.getElementById('discovery-section');
      const scroll = document.getElementById('discovery-scroll');
      const subtitle = document.getElementById('discovery-subtitle');

      // Only show rated restaurants
      const rated = list.filter(r => r.rating && r.rating > 0);

      if (rated.length === 0) {
        section.style.display = 'none';
        return;
      }

      section.style.display = '';

      // Sort by rating, then by review count
      const sorted = [...rated].sort((a, b) => {
        if (b.rating !== a.rating) return b.rating - a.rating;
        return (b.user_ratings_total || 0) - (a.user_ratings_total || 0);
      });

      // Take top 20
      const top = sorted.slice(0, 20);

      // Determine subtitle based on filter state
      if (state.activeCuisine !== 'all') {
        const cuisineLabel = CUISINES.find(c => c.id === state.activeCuisine);
        subtitle.textContent = (cuisineLabel ? cuisineLabel.label : '') + '高分餐廳';
      } else {
        subtitle.textContent = '評分 ' + top[0].rating.toFixed(1) + ' 起';
      }

      scroll.innerHTML = top.map(r => {
        const dist = r.distance ? formatDist(r.distance) : '';
        let imgHtml = '';
        if (r.photos && r.photos.length > 0) {
          imgHtml = '<img src="' + r.photos[0] + '" alt="" loading="lazy" />';
        }

        return '<div class="discovery-card" data-id="' + escAttr(r.id) + '">' +
          '<div class="discovery-card-img">' + imgHtml + '</div>' +
          '<div class="discovery-card-body">' +
            '<div class="discovery-card-name">' + escHtml(r.name || '') + '</div>' +
            '<div class="discovery-card-meta">' +
              (dist ? dist + ' · ' : '') +
              (r.price_level ? priceLevel(r.price_level) : '') +
            '</div>' +
            '<div class="discovery-card-rating">' +
              '<span class="stars">' + renderStars(r.rating) + '</span>' +
              '<span class="rating-num">' + r.rating + '</span>' +
              (r.user_ratings_total ? '<span class="rating-count">(' + r.user_ratings_total + ')</span>' : '') +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');

      scroll.querySelectorAll('.discovery-card').forEach(card => {
        card.addEventListener('click', () => showDetail(card.dataset.id));
      });
    }

    function renderList(list) {
      const container = document.getElementById('rest-list');
      const loadMoreEl = document.getElementById('load-more');
      const loadMoreBtn = document.getElementById('load-more-btn');

      if (list.length === 0) {
        container.innerHTML = '';
        loadMoreEl.style.display = 'none';
        return;
      }

      // Calculate how many to show
      const end = Math.min(state.loadMoreIndex + state.loadMoreStep, list.length);
      const display = list.slice(0, end);
      state.loadMoreIndex = end;

      container.innerHTML = display.map(r => {
        const dist = r.distance ? formatDist(r.distance) : '';
        const district = r.district_tc || r.district || '';
        const stars = r.rating ? renderStars(r.rating) : '';
        const price = r.price_level ? priceLevel(r.price_level) : '';

        let thumbHtml = '<div class="rest-card-thumb">';
        if (r.photos && r.photos.length > 0) {
          thumbHtml += '<img src="' + r.photos[0] + '" alt="" loading="lazy" onerror="this.style.display='none'" />';
        } else {
          thumbHtml += '';
          // No emoji - use CSS icon instead
        }
        thumbHtml += '</div>';

        let tags = '';
        if (district) tags += '<span class="tag tag-district">' + escHtml(district) + '</span>';
        if (dist) tags += '<span class="tag tag-distance">' + dist + '</span>';
        if (r.cuisine) tags += '<span class="tag tag-cuisine">' + escHtml(r.cuisine.split(',')[0]) + '</span>';
        if (price) tags += '<span class="tag tag-price">' + escHtml(price.trim()) + '</span>';

        return '<div class="rest-card" data-id="' + escAttr(r.id) + '">' +
          '<div class="rest-card-top">' +
            thumbHtml +
            '<div class="rest-card-body">' +
              '<div class="rest-name">' + escHtml(r.name || '') + '</div>' +
              (r.name_en && r.name_en !== r.name ? '<div class="rest-name-en">' + escHtml(r.name_en) + '</div>' : '') +
              (stars ? '<div class="rest-rating">' +
                '<span class="stars">' + stars + '</span>' +
                '<span class="rating-num">' + r.rating + '</span>' +
                (r.user_ratings_total ? '<span class="rating-count">(' + r.user_ratings_total + ')</span>' : '') +
              '</div>' : '') +
              '<div class="rest-info">' +
                (dist ? '<span class="rest-info-item">' + dist + '</span>' : '') +
                (price ? '<span class="rest-info-item">' + price + '</span>' : '') +
              '</div>' +
              '<div class="rest-tags">' + tags + '</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');

      container.querySelectorAll('.rest-card').forEach(card => {
        card.addEventListener('click', () => showDetail(card.dataset.id));
      });

      // Show load more button
      if (end < list.length) {
        loadMoreBtn.textContent = '載入更多 (' + (list.length - end) + ' 家)';
        loadMoreEl.style.display = 'block';
      } else {
        loadMoreEl.style.display = 'none';
      }
    }

    // -- Favorites Page --
    let favSortMode = 'recent';

    function showFavoritesPage() {
      document.getElementById('fav-page').classList.add('active');
      document.getElementById('view-toggle').style.display = 'none';
      document.getElementById('random-pick-btn').style.display = 'none';
      renderFavorites();
    }

    function hideFavoritesPage() {
      document.getElementById('fav-page').classList.remove('active');
      document.getElementById('view-toggle').style.display = '';
      document.getElementById('random-pick-btn').style.display = '';
    }

    function renderFavorites() {
      const favIds = Store.getFavorites();
      const container = document.getElementById('fav-list');
      const emptyEl = document.getElementById('fav-empty');

      if (favIds.length === 0) {
        container.innerHTML = '';
        emptyEl.style.display = 'block';
        return;
      }
      emptyEl.style.display = 'none';

      // Get favorite restaurants from Places data
      let favs = favIds.map(id => state.placesData.find(r => r.id === id)).filter(Boolean);

      // Sort
      switch (favSortMode) {
        case 'name': favs.sort((a, b) => (a.name || '').localeCompare(b.name || '')); break;
        case 'distance':
          if (state.currentLocation) {
            favs = favs.map(r => ({
              ...r,
              _favDist: haversine(state.currentLocation.lat, state.currentLocation.lng, parseFloat(r.lat), parseFloat(r.lng))
            }));
            favs.sort((a, b) => (a._favDist || Infinity) - (b._favDist || Infinity));
          }
          break;
        case 'recent':
        default:
          favs.reverse();
          break;
      }

      container.innerHTML = favs.map(r => {
        const dist = state.currentLocation ? formatDist(haversine(state.currentLocation.lat, state.currentLocation.lng, parseFloat(r.lat), parseFloat(r.lng))) : '';
        const district = r.district_tc || r.district || '';
        const stars = r.rating ? renderStars(r.rating) : '';
        const price = r.price_level ? priceLevel(r.price_level) : '';

        let thumbHtml = '<div class="rest-card-thumb">';
        if (r.photos && r.photos.length > 0) {
          thumbHtml += '<img src="' + r.photos[0] + '" alt="" loading="lazy" onerror="this.style.display='none'" />';
        } else {
          thumbHtml += '';
          // No emoji - use CSS icon instead
        }
        thumbHtml += '</div>';

        let tags = '';
        if (district) tags += '<span class="tag tag-district">' + escHtml(district) + '</span>';
        if (dist) tags += '<span class="tag tag-distance">' + dist + '</span>';
        if (r.cuisine) tags += '<span class="tag tag-cuisine">' + escHtml(r.cuisine.split(',')[0]) + '</span>';

        return '<div class="rest-card" data-id="' + escAttr(r.id) + '">' +
          '<div class="rest-card-top">' +
            thumbHtml +
            '<div class="rest-card-body">' +
              '<div class="rest-name">' + escHtml(r.name || '') + '</div>' +
              (r.name_en && r.name_en !== r.name ? '<div class="rest-name-en">' + escHtml(r.name_en) + '</div>' : '') +
              (stars ? '<div class="rest-rating">' +
                '<span class="stars">' + stars + '</span>' +
                '<span class="rating-num">' + r.rating + '</span>' +
                (r.user_ratings_total ? '<span class="rating-count">(' + r.user_ratings_total + ')</span>' : '') +
              '</div>' : '') +
              '<div class="rest-info">' +
                (dist ? '<span class="rest-info-item">' + dist + '</span>' : '') +
                (price ? '<span class="rest-info-item">' + price + '</span>' : '') +
              '</div>' +
              '<div class="rest-tags">' + tags + '</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');

      container.querySelectorAll('.rest-card').forEach(card => {
        card.addEventListener('click', () => {
          hideFavoritesPage();
          showDetail(card.dataset.id);
        });
      });
    }

    // -- Random Pick --
    function openRandomPick() {
      const overlay = document.getElementById('random-overlay');
      const body = document.getElementById('random-body');
      const footer = document.getElementById('random-footer');

      // Get eligible restaurants from filtered list
      const candidates = state.filtered.length > 0 ? state.filtered : state.placesData;

      if (candidates.length === 0) {
        showToast('暫無餐廳可選');
        return;
      }

      overlay.classList.add('active');
      footer.style.display = 'none';

      // Rolling animation
      let rollCount = 0;
      const maxRolls = 20;
      const rollInterval = setInterval(() => {
        const randomIdx = Math.floor(Math.random() * candidates.length);
        const r = candidates[randomIdx];
        document.getElementById('random-rolling-name').textContent = r.name || '未知餐廳';
        rollCount++;

        if (rollCount >= maxRolls) {
          clearInterval(rollInterval);
          showRandomResult(candidates);
        }
      }, 80);
    }

    function showRandomResult(candidates) {
      const idx = Math.floor(Math.random() * candidates.length);
      const r = candidates[idx];
      state.randomPickResult = r;

      const body = document.getElementById('random-body');
      const footer = document.getElementById('random-footer');
      const subtitle = document.getElementById('random-subtitle');

      const dist = r.distance ? formatDist(r.distance) : '';
      const district = r.district_tc || r.district || '';
      const detailParts = [];
      if (district) detailParts.push(district);
      if (dist) detailParts.push(dist);
      if (r.price_level) detailParts.push(priceLevel(r.price_level));

      body.style.display = 'none';
      footer.style.display = '';
      subtitle.textContent = '找到了！';

      document.getElementById('random-result-name').textContent = r.name || '未知餐廳';
      document.getElementById('random-result-detail').textContent = detailParts.join(' · ') || '';
      document.getElementById('random-result-rating').innerHTML = r.rating ?
        '<span class="stars" style="color:var(--star);font-size:14px;">' + renderStars(r.rating) + '</span>' +
        ' <span style="font-weight:600;">' + r.rating + '</span>' +
        (r.user_ratings_total ? ' <span style="color:var(--text-muted);font-size:12px;">(' + r.user_ratings_total + ' 則)</span>' : '')
        : '<span style="color:var(--text-muted);">暫無評分</span>';
    }

    function closeRandomPick() {
      document.getElementById('random-overlay').classList.remove('active');
      state.randomPickResult = null;
    }

    function rerollRandom() {
      const candidates = state.filtered.length > 0 ? state.filtered : state.placesData;

      if (candidates.length === 0) return;

      const body = document.getElementById('random-body');
      const footer = document.getElementById('random-footer');

      body.style.display = '';
      footer.style.display = 'none';
      document.getElementById('random-subtitle').textContent = '再選一次...';

      let rollCount = 0;
      const maxRolls = 15;
      const rollInterval = setInterval(() => {
        const randomIdx = Math.floor(Math.random() * candidates.length);
        const r = candidates[randomIdx];
        document.getElementById('random-rolling-name').textContent = r.name || '未知餐廳';
        rollCount++;

        if (rollCount >= maxRolls) {
          clearInterval(rollInterval);
          showRandomResult(candidates);
        }
      }, 70);
    }

    // -- Google Map --
    const mapTypes = {
      roadmap: google.maps.MapTypeId.ROADMAP,
      satellite: google.maps.MapTypeId.SATELLITE,
      terrain: google.maps.MapTypeId.TERRAIN,
      hybrid: google.maps.MapTypeId.HYBRID,
    };
    let currentMapType = 'roadmap';

    function initMap() {
      if (state.map) return;
      const loc = state.currentLocation;
      if (!loc) return;

      state.map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: loc.lat, lng: loc.lng },
        zoom: 14,
        zoomControl: false,
        streetViewControl: false,
        fullscreenControl: false,
        mapTypeControl: false,
        styles: [
          { featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] },
        ],
      });

      // User marker
      new google.maps.Marker({
        position: { lat: loc.lat, lng: loc.lng },
        map: state.map,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 10,
          fillColor: '#07C160',
          fillOpacity: 1,
          strokeColor: '#ffffff',
          strokeWeight: 3,
        },
        zIndex: 1000,
      });

      // Initialize Places service
      state.placesService = new google.maps.places.PlacesService(state.map);

      renderMapMarkers(state.filtered || state.placesData);
    }

    function switchMapType(name) {
      if (!state.map || !mapTypes[name]) return;
      state.map.setMapTypeId(mapTypes[name]);
      currentMapType = name;

      // Update toggle buttons
      document.querySelectorAll('#map-tile-toggle button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tile === name);
      });
    }

    function renderMapMarkers(list) {
      if (!state.map) return;

      // Clear old markers
      state.markers.forEach(m => m.setMap(null));
      state.markers = [];

      const bounds = state.map.getBounds();
      const visible = list.filter(r => {
        if (!r.lat || !r.lng) return false;
        return bounds.contains({ lat: parseFloat(r.lat), lng: parseFloat(r.lng) });
      });

      const display = visible.slice(0, 500);
      display.forEach(r => {
        const marker = new google.maps.Marker({
          position: { lat: parseFloat(r.lat), lng: parseFloat(r.lng) },
          map: state.map,
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            scale: 6,
            fillColor: r.rating >= 4 ? '#07C160' : r.rating >= 3 ? '#F39C12' : '#E74C3C',
            fillOpacity: 1,
            strokeColor: '#ffffff',
            strokeWeight: 2,
          },
        });
        marker.addListener('click', () => showDetail(r.id));
        state.markers.push(marker);
      });
    }

    // -- Detail View --
    function showDetail(id) {
      const r = state.placesData.find(x => x.id === id);
      if (!r) return;

      // Close random pick if open
      closeRandomPick();

      const loc = state.currentLocation;
      const dist = loc ? formatDist(haversine(loc.lat, loc.lng, parseFloat(r.lat), parseFloat(r.lng))) : '';
      const isFav = Store.isFav(r.id);

      // Update fav button
      const favBtn = document.getElementById('detail-fav');
      favBtn.textContent = isFav ? '\u2665' : '\u2661';
      favBtn.className = 'detail-fav' + (isFav ? ' is-fav' : '');

      // For Places data, fetch details on demand
      let photosHtml = '';
      if (r.photos && r.photos.length > 0) {
        photosHtml = '<div class="detail-photos">' +
          r.photos.map(p => '<img class="detail-photo" src="' + p + '" alt="" />').join('') +
        '</div>';
      }

      const content = document.getElementById('detail-content');
      content.innerHTML =
        '<div class="detail-hero">' +
          '<div class="detail-name">' + escHtml(r.name || '') + '</div>' +
          (r.name_en && r.name_en !== r.name ? '<div class="detail-name-en">' + escHtml(r.name_en) + '</div>' : '') +
          (r.rating ? '<div class="detail-rating-row">' +
            '<span class="detail-stars">' + renderStars(r.rating) + '</span>' +
            '<span class="detail-rating-score">' + r.rating + '</span>' +
            (r.user_ratings_total ? '<span class="detail-rating-count">(' + r.user_ratings_total + ' 則評價)</span>' : '') +
          '</div>' : '') +
          '<div class="detail-meta">' +
            (dist ? '<span class="detail-meta-item">' + dist + '</span>' : '') +
            (r.price_level ? '<span class="detail-meta-item">' + priceLevel(r.price_level) + '</span>' : '') +
            (r.district_tc || r.district ? '<span class="detail-meta-item">' + (r.district_tc || r.district) + '</span>' : '') +
          '</div>' +
        '</div>' +
        photosHtml +
        '<div class="detail-section">' +
          '<div class="detail-section-title">地址</div>' +
          '<div class="detail-address">' + escHtml(r.address || '暫無地址資料') + '</div>' +
        '</div>' +

        (r.place_id ? '<div class="detail-section" id="detail-hours-section">' +
          '<div class="detail-section-title">營業時間</div>' +
          '<div class="loading" style="padding:16px;"><div class="loading-spinner"></div></div>' +
        '</div>' : '') +
        '<div class="detail-section">' +
          '<div class="detail-section-title">位置</div>' +
          '<div class="detail-map" id="detail-map"></div>' +
        '</div>' +
        '<div class="detail-actions">' +
          '<button class="action-btn action-btn-secondary" onclick="window.open(\'https://maps.google.com/?q=' + encodeURIComponent(r.name || '') + '&query=' + r.lat + ',' + r.lng + '\', \'_blank\')">Google 地圖</button>' +
          '<button class="action-btn action-btn-primary" onclick="window.open(\'https://www.google.com/maps/dir/?api=1&destination=' + r.lat + ',' + r.lng + '\', \'_blank\')">導航</button>' +
        '</div>';

      document.getElementById('detail-view').classList.add('active');

      // Fetch opening hours for Places data
      if (r.place_id) {
        fetchPlaceDetails(r.place_id, (details) => {
          if (!details) return;
          const section = document.getElementById('detail-hours-section');
          if (!section) return;
          let hoursHtml = '<div class="detail-section-title">營業時間</div>';
          if (details.opening_hours) {
            const isOpen = details.opening_hours.isOpen();
            hoursHtml += '<div class="detail-hours">' +
              '<div class="detail-hours-row">' +
                '<span class="' + (isOpen ? 'detail-hours-open' : 'detail-hours-closed') + '">' + (isOpen ? '營業中' : '已歇業') + '</span>' +
              '</div>' +
              (details.opening_hours.weekday_text || []).map(w => {
                const [day, time] = w.split(': ');
                return '<div class="detail-hours-row">' +
                  '<span class="detail-hours-day">' + day + '</span>' +
                  '<span class="detail-hours-time">' + time + '</span>' +
                '</div>';
              }).join('') +
            '</div>';
          } else {
            hoursHtml += '<div style="color:var(--text-muted);font-size:13px;">暫無營業時間資料</div>';
          }
          if (details.formatted_phone_number) {
            hoursHtml += '<div style="margin-top:12px;"><span style="font-weight:500;">電話: </span>' + details.formatted_phone_number + '</div>';
          }
          if (details.website) {
            hoursHtml += '<div style="margin-top:4px;"><span style="font-weight:500;">網站: </span><a href="' + details.website + '" target="_blank" style="color:var(--brand);">前往網站</a></div>';
          }
          section.innerHTML = hoursHtml;
        });
      }

      // Mini map
      setTimeout(() => {
        const mapEl = document.getElementById('detail-map');
        if (mapEl && !mapEl.dataset.init) {
          mapEl.dataset.init = '1';
          const miniMap = new google.maps.Map(mapEl, {
            zoomControl: false,
            streetViewControl: false,
            fullscreenControl: false,
            mapTypeControl: false,
          });
          miniMap.setCenter({ lat: parseFloat(r.lat), lng: parseFloat(r.lng) });
          miniMap.setZoom(16);
          new google.maps.Marker({
            position: { lat: parseFloat(r.lat), lng: parseFloat(r.lng) },
            map: miniMap,
          });
        }
      }, 100);
    }

    // -- Location Modal --
    function showLocationModal() {
      const locs = [...DEFAULT_LOCATIONS];
      const customLocs = Store.getCustomLocations();

      // Render default locations
      const container = document.getElementById('loc-list');
      container.innerHTML = locs.map(l => {
        const isCurrent = state.currentLocation && state.currentLocation.id === l.id;
        return '<div class="loc-item" data-loc-id="' + l.id + '">' +
          '<div>' +
            '<div class="loc-item-name">' + l.label + '</div>' +
          '</div>' +
          (isCurrent ? '<span style="color:var(--brand);">目前</span>' : '') +
        '</div>';
      }).join('');

      container.querySelectorAll('.loc-item').forEach(item => {
        item.addEventListener('click', () => {
          const loc = locs.find(l => l.id === item.dataset.locId);
          if (loc) selectLocation(loc);
        });
      });

      // Render custom locations
      const customContainer = document.getElementById('custom-loc-list');
      if (customLocs.length === 0) {
        customContainer.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:4px 0;">尚未新增自訂地點</div>';
      } else {
        customContainer.innerHTML = customLocs.map(cl => {
          const isCurrent = state.currentLocation && state.currentLocation.id === cl.id;
          return '<div class="loc-item" data-custom-id="' + cl.id + '">' +
            '<div style="display:flex;align-items:center;flex:1;min-width:0;">' +
              '<div style="margin-right:8px;width:8px;height:8px;border-radius:50%;background:var(--brand);flex-shrink:0;"></div>' +
              '<div>' +
                '<div class="loc-item-name">' + escHtml(cl.label) + '</div>' +
              '</div>' +
            '</div>' +
            (isCurrent ? '<span style="color:var(--brand);">目前</span>' : '') +
            '<button class="loc-item-delete" data-del-id="' + cl.id + '">×</button>' +
          '</div>';
        }).join('');

        customContainer.querySelectorAll('.loc-item').forEach(item => {
          item.addEventListener('click', (e) => {
            if (e.target.classList.contains('loc-item-delete')) {
              e.stopPropagation();
              const delId = e.target.dataset.delId;
              Store.removeCustomLocation(delId);
              showLocationModal(); // Refresh
              return;
            }
            const cl = customLocs.find(l => l.id === item.dataset.customId);
            if (cl) selectLocation(cl);
          });
        });
      }

      document.getElementById('loc-modal').classList.add('active');
    }

    function hideLocationModal() {
      document.getElementById('loc-modal').classList.remove('active');
    }

    function selectLocation(loc) {
      Store.setLocation(loc);
      state.currentLocation = loc;
      state.currentLocationLabel = loc.label;
      hideLocationModal();

      // Update header button text
      document.getElementById('loc-btn').textContent = loc.label;

      // Reset state
      state.placesData = [];
      state.filtered = [];
      state.placesLoaded = false;

      // Update map center
      if (state.map) {
        state.map.setCenter({ lat: loc.lat, lng: loc.lng });
        state.map.setZoom(14);
      }

      loadRestaurants();
      showToast('已切換至 ' + loc.label);
    }

    function useGPS() {
      if (!navigator.geolocation) {
        showToast('瀏覽器不支援定位');
        return;
      }
      showToast('正在獲取位置...');
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;

          // Reverse geocode to get address name
          if (state.geocoder) {
            state.geocoder.geocode({ location: { lat: lat, lng: lng } }, (results, status) => {
              let label = '目前位置';
              if (status === 'OK' && results && results[0]) {
                // Extract a short address name
                const addr = results[0].formatted_address;
                const parts = addr.split(',');
                // Use the first meaningful part (usually street/area name)
                label = parts[0].trim();
                if (parts.length > 1) {
                  // Add district if available
                  for (const p of parts.slice(1)) {
                    const trimmed = p.trim();
                    if (trimmed.includes('香港') || trimmed.includes('九龍') || trimmed.includes('新界')) {
                      label += ', ' + trimmed;
                      break;
                    }
                  }
                }
              }
              const loc = {
                id: 'gps_' + Date.now(),
                label: label,
                lat: lat,
                lng: lng
              };
              selectLocation(loc);
              hideLocationModal();
            });
          } else {
            const loc = { id: 'gps_' + Date.now(), label: '目前位置', lat: lat, lng: lng };
            selectLocation(loc);
            hideLocationModal();
          }
        },
        () => {
          showToast('定位失敗，請手動選擇地點');
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    // -- Toast --
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // -- View Toggle --
    function setView(view) {
      state.currentView = view;
      document.querySelectorAll('.view-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.view === view);
      });

      if (view === 'list') {
        document.getElementById('list-view').style.display = 'block';
        document.getElementById('map-view').classList.remove('active');
        document.querySelector('.header').style.display = '';
        document.querySelector('.toolbar').style.display = '';
        document.querySelector('.cuisine-bar').style.display = '';
        document.getElementById('discovery-section').style.display = state.filtered.filter(r => r.rating && r.rating > 0).length > 0 ? '' : 'none';
      } else {
        document.getElementById('list-view').style.display = 'none';
        document.getElementById('map-view').classList.add('active');
        document.querySelector('.header').style.display = '';
        document.querySelector('.toolbar').style.display = '';
        document.querySelector('.cuisine-bar').style.display = '';
        document.getElementById('discovery-section').style.display = 'none';
        initMap();
        setTimeout(() => {
          if (state.map) {
            google.maps.event.trigger(state.map, 'resize');
            renderMapMarkers(state.filtered || state.placesData);
          }
        }, 200);
      }
    }

    // -- Cuisine bar --
    function renderCuisineBar() {
      const bar = document.getElementById('cuisine-bar');
      bar.innerHTML = CUISINES.map(c =>
        '<button class="cuisine-chip' + (state.activeCuisine === c.id ? ' active' : '') + '" data-cuisine="' + c.id + '">' + c.label + '</button>'
      ).join('');

      bar.querySelectorAll('.cuisine-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          state.activeCuisine = chip.dataset.cuisine;
          bar.querySelectorAll('.cuisine-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          updateDisplay();
        });
      });
    }

    // -- Init --
    function init() {
      // Restore location
      let loc = Store.getLocation();
      if (!loc) {
        loc = DEFAULT_LOCATIONS.find(l => l.isDefault) || DEFAULT_LOCATIONS[0];
        Store.setLocation(loc);
      }
      state.currentLocation = loc;
      state.currentLocationLabel = loc.label;

      // Initialize geocoder
      state.geocoder = new google.maps.Geocoder();

      // Update location button text to show current location
      document.getElementById('loc-btn').textContent = loc.label;

      // Search with debounce
      let searchTimer;
      const searchInput = document.getElementById('search-input');
      const searchClear = document.getElementById('search-clear');

      searchInput.addEventListener('input', (e) => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
          state.searchQuery = e.target.value.trim();
          searchClear.classList.toggle('visible', state.searchQuery.length > 0);
          updateDisplay();
        }, 200);
      });

      searchClear.addEventListener('click', () => {
        searchInput.value = '';
        state.searchQuery = '';
        searchClear.classList.remove('visible');
        updateDisplay();
      });

      // Sort buttons
      document.querySelectorAll('.toolbar-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.toolbar-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          state.currentSort = btn.dataset.sort;
          updateDisplay();
        });
      });

      // View toggle
      document.querySelectorAll('.view-btn').forEach(btn => {
        btn.addEventListener('click', () => setView(btn.dataset.view));
      });

      // Map type toggle (roadmap/satellite/terrain/hybrid)
      document.querySelectorAll('#map-tile-toggle button').forEach(btn => {
        btn.addEventListener('click', () => switchMapType(btn.dataset.tile));
      });

      // Load more button
      document.getElementById('load-more-btn').addEventListener('click', () => {
        updateDisplay(false);
      });

      // Location button
      document.getElementById('loc-btn').addEventListener('click', showLocationModal);
      document.getElementById('loc-modal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) hideLocationModal();
      });
      document.getElementById('gps-btn').addEventListener('click', useGPS);

      // Add custom location button
      document.getElementById('add-custom-loc-btn').addEventListener('click', () => {
        hideLocationModal();
        document.getElementById('add-loc-modal').classList.add('active');
        document.getElementById('custom-loc-name').value = '';
      });

      // Cancel custom location
      document.getElementById('cancel-custom-loc').addEventListener('click', () => {
        document.getElementById('add-loc-modal').classList.remove('active');
      });

      // Add custom location modal overlay click
      document.getElementById('add-loc-modal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) {
          document.getElementById('add-loc-modal').classList.remove('active');
        }
      });

      // Add custom location via GPS
      document.getElementById('custom-loc-gps').addEventListener('click', () => {
        if (!navigator.geolocation) {
          showToast('瀏覽器不支援定位');
          return;
        }
        showToast('正在獲取位置...');
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const name = document.getElementById('custom-loc-name').value.trim();
            if (!name) {
              showToast('請輸入地點名稱');
              return;
            }
            // Reverse geocode for better label
            let label = name;
            const saveAndClose = (finalLabel) => {
              const loc = {
                id: 'custom_' + Date.now(),
                label: finalLabel,
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                isCustom: true
              };
              Store.addCustomLocation(loc);
              document.getElementById('add-loc-modal').classList.remove('active');
              showToast('已新增 ' + finalLabel);
            };

            if (state.geocoder) {
              state.geocoder.geocode({ location: { lat: pos.coords.latitude, lng: pos.coords.longitude } }, (results, status) => {
                if (status === 'OK' && results && results[0]) {
                  label = name + ' (' + results[0].formatted_address.split(',')[0].trim() + ')';
                }
                saveAndClose(label);
              });
            } else {
              saveAndClose(label);
            }
          },
          () => {
            showToast('定位失敗');
          },
          { enableHighAccuracy: true, timeout: 10000 }
        );
      });

      // Add custom location via map pick
      document.getElementById('custom-loc-map').addEventListener('click', () => {
        document.getElementById('add-loc-modal').classList.remove('active');

        // Switch to map view temporarily
        setView('map');

        // Add click listener to map for location picking
        const pickListener = (e) => {
          const name = document.getElementById('custom-loc-name').value.trim() || '自訂地點';
          const loc = {
            id: 'custom_' + Date.now(),
            label: name,
            lat: e.latLng.lat(),
            lng: e.latLng.lng(),
            isCustom: true
          };
          Store.addCustomLocation(loc);
          state.map.removeListener('click', pickListener);

          // Switch back to list view
          setView('list');
          showToast('已新增 ' + name);
        };
        state.map.addListener('click', pickListener);
        showToast('點擊地圖選擇位置');
      });

      // Favorites button
      document.getElementById('fav-btn').addEventListener('click', showFavoritesPage);
      document.getElementById('fav-back').addEventListener('click', hideFavoritesPage);

      // Favorite sort buttons
      document.querySelectorAll('.fav-sort-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.fav-sort-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          favSortMode = btn.dataset.favSort;
          renderFavorites();
        });
      });

      // Detail back
      document.getElementById('detail-back').addEventListener('click', () => {
        document.getElementById('detail-view').classList.remove('active');
      });

      // Detail favorite toggle
      document.getElementById('detail-fav').addEventListener('click', () => {
        const detailEl = document.getElementById('detail-view');
        // Find the current restaurant being displayed
        const content = document.getElementById('detail-content');
        const nameEl = content.querySelector('.detail-name');
        if (!nameEl) return;
        const name = nameEl.textContent;
        const r = state.placesData.find(x => x.name === name);
        if (!r) return;
        const added = Store.toggleFav(r.id);
        const favBtn = document.getElementById('detail-fav');
        favBtn.textContent = added ? '\u2665' : '\u2661';
        favBtn.className = 'detail-fav' + (added ? ' is-fav' : '');
        showToast(added ? '已收藏' : '已取消收藏');
      });

      // Map panel close
      document.getElementById('map-panel-close').addEventListener('click', () => {
        document.getElementById('map-panel').classList.remove('active');
      });

      // Cuisine bar
      renderCuisineBar();

      // Random pick
      document.getElementById('random-pick-btn').addEventListener('click', openRandomPick);
      document.getElementById('random-close').addEventListener('click', closeRandomPick);
      document.getElementById('random-overlay').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeRandomPick();
      });
      document.getElementById('random-reroll').addEventListener('click', rerollRandom);
      document.getElementById('random-view').addEventListener('click', () => {
        if (state.randomPickResult) {
          showDetail(state.randomPickResult.id);
        }
      });

      // Load data
      loadRestaurants();
    }

    init();
  </script>
</body>
</html>
