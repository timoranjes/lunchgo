<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LunchGo 搵食</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>

  <!-- Header -->
  <div class="header" id="main-header">
    <div class="header-top">
      <h1>LunchGo <span>搵食</span></h1>
      <button class="fav-btn" id="fav-btn">收藏</button>
      <button class="loc-btn" id="loc-btn">中環</button>
    </div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="搜尋餐廳名稱、地址、地區..." />
      <button class="search-clear" id="search-clear">×</button>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar">
    <button class="toolbar-btn active" data-sort="distance">距離最近</button>
    <button class="toolbar-btn" data-sort="rating">評分最高</button>
    <button class="toolbar-btn toolbar-btn-hidden" data-sort="name" aria-hidden="true" tabindex="-1">名稱排序</button>
    <button class="toolbar-btn toolbar-btn-hidden" data-sort="district" aria-hidden="true" tabindex="-1">地區排序</button>
  </div>

  <!-- Cuisine Filter -->
  <div class="cuisine-bar" id="cuisine-bar"></div>

  <!-- Price Filter -->
  <div class="price-bar" id="price-bar"></div>

  <!-- Error Banner -->
  <div class="error-banner" id="error-banner"></div>

  <!-- Discovery Section -->
  <div class="discovery-section" id="discovery-section" style="display:none;">
    <div class="discovery-header">
      <div>
        <div class="discovery-title">好去處推薦</div>
        <div class="discovery-subtitle" id="discovery-subtitle">高分餐廳</div>
      </div>
    </div>
    <div class="discovery-scroll" id="discovery-scroll"></div>
  </div>

  <!-- List View -->
  <div class="list-container" id="list-view">
    <div class="list-header">
      <div class="result-count" id="result-count"></div>
      <button class="random-pick-btn" id="random-pick-btn">今天吃什麼</button>
    </div>
    <div id="rest-list"></div>
    <div class="load-more" id="load-more" style="display:none;">
      <button id="load-more-btn">載入更多</button>
    </div>
    <div class="empty" id="empty-state" style="display:none;">找不到餐廳</div>
    <div class="loading" id="loading-state">
      <div class="loading-spinner"></div>
      <div>載入餐廳...</div>
    </div>
  </div>

  <!-- Map View -->
  <div id="map-view">
    <div class="map-tile-toggle" id="map-tile-toggle">
      <button class="active" data-tile="roadmap">地圖</button>
      <button data-tile="satellite">衛星</button>
      <button data-tile="terrain">地形</button>
      <button data-tile="hybrid">混合</button>
    </div>
    <div id="map"></div>
    <div class="map-info-panel" id="map-panel">
      <button class="close-btn" id="map-panel-close">+</button>
      <div id="map-panel-content"></div>
    </div>
  </div>

  <!-- Detail View -->
  <div class="detail-overlay" id="detail-view">
    <div class="detail-header">
      <button class="detail-back" id="detail-back"></button>
      <span style="font-weight:600;">餐廳詳情</span>
      <button class="detail-fav" id="detail-fav">&#9825;</button>
    </div>
    <div id="detail-content"></div>
  </div>

  <!-- Favorites Page -->
  <div class="fav-page" id="fav-page">
    <div class="fav-page-header">
      <button class="fav-page-back" id="fav-back"></button>
      <span class="fav-page-title">收藏餐廳</span>
    </div>
    <div class="fav-sort-bar">
      <button class="fav-sort-btn active" data-fav-sort="recent">最近添加</button>
      <button class="fav-sort-btn" data-fav-sort="name">名稱</button>
      <button class="fav-sort-btn" data-fav-sort="distance">距離</button>
    </div>
    <div class="list-container" id="fav-list-container">
      <div id="fav-list"></div>
      <div class="empty" id="fav-empty">未收藏任何餐廳</div>
    </div>
  </div>

  <!-- Location Modal -->
  <div class="modal-overlay" id="loc-modal">
    <div class="modal-content">
      <div class="modal-title">選擇地點</div>
      <div class="loc-search-bar">
        <input type="text" id="loc-search-input" placeholder="搜尋地點..." autocomplete="off" />
        <div id="loc-search-results" class="loc-search-results"></div>
      </div>
      <div id="loc-list" style="margin-bottom:12px;"></div>
      <div class="loc-section-sep"></div>
      <div style="display:flex;gap:8px;">
        <button class="gps-btn" id="gps-btn" style="flex:1;">使用目前位置 (GPS)</button>
        <button class="gps-btn" id="map-pick-loc-btn" style="flex:1;">在地圖上選點</button>
      </div>
      <div class="custom-section">
        <div class="custom-section-title">我的地點</div>
        <div id="custom-loc-list"></div>
        <button class="gps-btn" id="add-custom-loc-btn" style="border-style:solid;font-size:13px;">+ 新增地點</button>
      </div>
    </div>
  </div>

  <!-- Add Custom Location Modal -->
  <div class="modal-overlay" id="add-loc-modal">
    <div class="modal-content">
      <div class="modal-title">新增自訂地點</div>
      <div style="margin-bottom:12px;">
        <label style="font-size:13px;font-weight:500;display:block;margin-bottom:4px;">地點名稱</label>
        <input type="text" id="custom-loc-name" placeholder="例如：公司、家、運動場..." style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;" />
      </div>
      <div style="margin-bottom:12px;">
        <label style="font-size:13px;font-weight:500;display:block;margin-bottom:4px;">搜尋地址 / 地標</label>
        <input type="text" id="custom-loc-search" placeholder="輸入永安中心、太古城中心..." style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;" autocomplete="off" />
        <div id="custom-loc-suggestions" class="loc-search-results"></div>
      </div>
      <div class="loc-confirm-card" id="custom-loc-preview">
        <div class="loc-confirm-title" id="custom-loc-preview-title">等待解析地址</div>
        <div class="loc-confirm-sub" id="custom-loc-preview-address">輸入名稱和地址後，我們會幫你補全座標並確認位置。</div>
        <div class="loc-confirm-map" id="custom-loc-map-preview"></div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="gps-btn" id="custom-loc-save" style="flex:1;margin-top:0;">儲存地點</button>
        <button class="gps-btn" id="custom-loc-map" style="flex:1;margin-top:0;">地圖微調</button>
      </div>
      <button class="gps-btn" id="custom-loc-gps" style="margin-top:8px;">使用 GPS 填入目前位置</button>
      <button class="gps-btn" id="cancel-custom-loc" style="margin-top:8px;border-style:solid;color:var(--text-secondary);border-color:var(--border);">取消</button>
    </div>
  </div>

  <!-- Random Pick Modal -->
  <div class="random-overlay" id="random-overlay">
    <div class="random-card">
      <div class="random-header" style="position:relative;">
        <button class="random-close" id="random-close">×</button>
        <h2>今天吃什麼？</h2>
        <p id="random-subtitle">先揀模式，再開始抽</p>
      </div>
      <div id="random-setup" class="random-setup">
        <div class="random-section-title">抽選模式</div>
        <div class="random-mode-bar" id="random-mode-bar">
          <button class="random-mode-btn active" data-random-mode="walkable">附近步行</button>
          <button class="random-mode-btn" data-random-mode="keyword">按需求</button>
          <button class="random-mode-btn" data-random-mode="favorites">收藏盲選</button>
        </div>
        <div class="random-section-title">範圍</div>
        <div class="random-scope-bar" id="random-scope-bar">
          <button class="random-scope-btn active" data-random-scope="walkable">步行優先</button>
          <button class="random-scope-btn" data-random-scope="all">全部候選</button>
        </div>
        <div class="random-keyword-block" id="random-keyword-block">
          <label for="random-query-input">需求關鍵字</label>
          <input type="text" id="random-query-input" placeholder="例如：米線、燒肉、咖啡" />
        </div>
        <div class="random-setup-hint">預設會優先抽取可步行到達的餐廳；可先輸入需求再開始抽。</div>
        <div class="random-actions random-setup-actions">
          <button class="action-btn action-btn-secondary" id="random-close-setup">取消</button>
          <button class="action-btn action-btn-primary" id="random-start">開始抽</button>
        </div>
      </div>
      <div id="random-body">
        <div class="random-rolling">
          <div class="random-rolling-name" id="random-rolling-name">...</div>
        </div>
      </div>
      <div id="random-footer" style="display:none;">
        <div class="random-result">
          <div class="random-result-name" id="random-result-name"></div>
          <div class="random-result-detail" id="random-result-detail"></div>
          <div class="random-result-rating" id="random-result-rating"></div>
        </div>
        <div class="random-actions">
          <button class="action-btn action-btn-secondary" id="random-reroll">再選一次</button>
          <button class="action-btn action-btn-primary" id="random-view">查看詳情</button>
        </div>
      </div>
    </div>
  </div>

  <!-- View Toggle -->
  <div class="view-toggle" id="view-toggle">
    <button class="view-btn active" data-view="list">列表</button>
    <button class="view-btn" data-view="map">地圖</button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Google Maps + Places -->
  <script src="src/google-bootstrap.js"></script>

  <script type="module" src="src/app.js"></script>
</body>
</html>
