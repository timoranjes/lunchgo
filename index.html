<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>午膳快 LunchGo</title>
  <style>
    :root {
      --brand-green: #07C160;
      --brand-dark: #06ad56;
      --status-green: #07C160;
      --status-yellow: #FFC107;
      --status-orange: #FF9800;
      --status-red: #F44336;
      --bg: #f5f5f5;
      --card: #ffffff;
      --text-primary: #333333;
      --text-secondary: #666666;
      --text-muted: #999999;
      --border: #e5e5e5;
      --radius: 16px;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      background: var(--bg); color: var(--text-primary); font-size: 14px;
      line-height: 1.5; -webkit-font-smoothing: antialiased; overflow-x: hidden; padding-bottom: 60px;
    }

    /* Header */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; background: var(--bg); position: sticky; top: 0; z-index: 100;
    }
    .header-title { font-size: 20px; font-weight: 600; }
    .menu-btn { padding: 8px; cursor: pointer; }
    .menu-btn::before { content: "\2630"; font-size: 20px; color: var(--text-secondary); }

    /* Location Bar */
    .location-bar {
      display: flex; align-items: center; gap: 8px; padding: 8px 16px;
      background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 44px; z-index: 99;
    }
    .location-current {
      flex: 1; display: flex; align-items: center; gap: 6px;
      font-size: 14px; font-weight: 500; cursor: pointer; padding: 6px 10px;
      border-radius: 8px; background: #f5f5f5;
    }
    .location-current::before { content: "\1F4CD"; }
    .location-sub { font-size: 11px; color: var(--text-muted); margin-left: 4px; }
    .location-refresh {
      padding: 6px 10px; border-radius: 8px; background: var(--brand-green);
      color: #fff; font-size: 12px; border: none; cursor: pointer;
    }

    /* Container */
    .container { padding: 0 16px 20px; }
    .card {
      background: var(--card); border-radius: var(--radius); padding: 16px;
      margin-bottom: 12px; box-shadow: var(--shadow);
    }

    /* Budget */
    .budget-section { padding: 16px; }
    .budget-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .budget-label { font-size: 15px; font-weight: 500; }
    .budget-value { font-size: 18px; font-weight: 600; color: var(--brand-green); }
    .budget-slider { width: 100%; margin: 8px 0; accent-color: var(--brand-green); }
    .mode-toggle { display: flex; gap: 8px; margin-top: 12px; }
    .mode-btn {
      flex: 1; text-align: center; padding: 8px; border-radius: 6px;
      background: #f0f0f0; color: var(--text-secondary); font-size: 12px; cursor: pointer;
    }
    .mode-btn.active { background: var(--brand-green); color: #fff; }

    /* Cuisine Chips */
    .cuisine-scroll { overflow-x: auto; white-space: nowrap; margin: 12px 0; -webkit-overflow-scrolling: touch; }
    .cuisine-scroll::-webkit-scrollbar { display: none; }
    .cuisine-chips { display: inline-flex; gap: 8px; padding: 4px 0; }
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 8px 14px; border-radius: 20px; background: #fff;
      border: 1.5px solid var(--border); font-size: 13px; color: var(--text-secondary);
      cursor: pointer; transition: all 0.15s;
    }
    .chip.active { background: var(--brand-green); color: #fff; border-color: var(--brand-green); }

    /* Quick Pick */
    .qp-card {
      background: linear-gradient(135deg, var(--brand-green) 0%, var(--brand-dark) 100%);
      color: #fff; padding: 24px 20px; border-radius: 20px; cursor: pointer; margin: 12px 0;
    }
    .qp-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .qp-title { font-size: 20px; font-weight: 600; }
    .qp-sub { font-size: 13px; opacity: 0.9; }
    .qp-modes { display: flex; gap: 10px; margin-top: 14px; justify-content: center; }
    .qp-mode {
      flex: 1; text-align: center; padding: 10px; border-radius: 8px;
      background: #fff; border: 1.5px solid var(--border);
      color: var(--text-secondary); font-size: 13px; cursor: pointer;
    }
    .qp-mode.active { border-color: var(--brand-green); color: var(--brand-green); background: #f0fff5; }

    /* Recommendation */
    .rec-card { padding: 20px; border-left: 4px solid var(--brand-green); }
    .rec-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .rec-name { font-size: 17px; font-weight: 600; }
    .heart-icon { font-size: 20px; cursor: pointer; color: #ccc; }
    .heart-icon.active { color: var(--brand-green); }
    .rec-details { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; }
    .rec-dot { font-size: 10px; }
    .rec-time { color: var(--brand-green); font-weight: 500; }
    .rec-reason { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
    .rec-actions { display: flex; gap: 10px; }
    .action-btn {
      flex: 1; padding: 10px; border-radius: 8px; font-size: 13px; text-align: center; border: none; cursor: pointer;
    }
    .btn-accept { background: var(--brand-green); color: #fff; }
    .btn-refresh { background: #f0f0f0; color: var(--text-secondary); }
    .btn-detail { background: #e8f5e9; color: var(--brand-green); }

    /* Favorites Preview */
    .fav-card { padding: 14px 16px; cursor: pointer; }
    .fav-header { display: flex; justify-content: space-between; align-items: center; }
    .fav-title { font-size: 14px; font-weight: 500; }
    .fav-preview { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .fav-item { font-size: 12px; color: var(--text-secondary); background: #f0f0f0; padding: 4px 10px; border-radius: 6px; }

    /* Buttons */
    .btn-primary {
      width: 100%; padding: 14px; background: var(--brand-green); color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 500;
      cursor: pointer; margin: 12px 0;
    }

    /* Deal Banner */
    .deal-banner { padding: 14px 16px; background: #fff8e1; border-left: 4px solid var(--status-yellow); cursor: pointer; }
    .deal-text { font-size: 14px; font-weight: 500; }

    /* Navigation */
    .page { display: none; }
    .page.active { display: block; }
    .nav-back {
      display: flex; align-items: center; gap: 8px; padding: 12px 16px;
      cursor: pointer; font-size: 14px; color: var(--text-secondary);
    }
    .nav-back::before { content: "\2190"; font-size: 18px; }

    /* List */
    .list-card { padding: 14px 16px; cursor: pointer; }
    .list-header { display: flex; justify-content: space-between; align-items: center; }
    .list-name { font-size: 15px; font-weight: 500; }
    .list-meta { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .list-tags { display: flex; gap: 6px; margin-top: 6px; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #f0f0f0; color: var(--text-muted); }

    /* Settings */
    .setting-label { font-size: 14px; font-weight: 500; margin-bottom: 10px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip-excluded { background: var(--status-red) !important; color: #fff !important; border-color: var(--status-red) !important; }
    .price-options { display: flex; gap: 10px; }
    .price-btn { flex: 1; text-align: center; padding: 10px; border-radius: 8px; background: #f0f0f0; font-size: 13px; cursor: pointer; }
    .price-btn.active { background: var(--brand-green); color: #fff; }

    /* Location Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500;
      display: none; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-content {
      background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 480px;
      max-height: 70vh; overflow-y: auto; padding: 20px;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-title { font-size: 17px; font-weight: 600; }
    .modal-close { font-size: 20px; cursor: pointer; color: var(--text-muted); padding: 4px; }
    .location-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 0; border-bottom: 1px solid var(--border); cursor: pointer;
    }
    .location-item:last-child { border-bottom: none; }
    .location-item-name { font-size: 15px; font-weight: 500; }
    .location-item-sub { font-size: 12px; color: var(--text-muted); }
    .location-item.active .location-item-name { color: var(--brand-green); }
    .add-location {
      display: flex; align-items: center; gap: 8px; padding: 14px 0;
      color: var(--brand-green); font-size: 15px; cursor: pointer;
    }

    /* Add Location Form */
    .add-form { margin-top: 12px; padding: 12px; background: #f5f5f5; border-radius: 12px; display: none; }
    .add-form.show { display: block; }
    .add-form input {
      width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px;
      margin-bottom: 8px; font-size: 14px;
    }
    .add-form-btns { display: flex; gap: 8px; }
    .add-form-btns button { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; }
    .btn-save { background: var(--brand-green); color: #fff; }
    .btn-cancel { background: #f0f0f0; color: var(--text-secondary); }

    /* Toast */
    .toast {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.75); color: #fff; padding: 12px 20px;
      border-radius: 8px; font-size: 14px; z-index: 1000; opacity: 0;
      transition: opacity 0.2s; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* Empty / Loading */
    .empty { text-align: center; padding: 60px 0; color: var(--text-muted); }
    .empty-hint { font-size: 12px; margin-top: 8px; }
    .loading { text-align: center; padding: 40px 0; color: var(--text-muted); }

    /* Tab Bar */
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; display: flex;
      background: #fff; border-top: 1px solid var(--border); z-index: 200;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .tab {
      flex: 1; text-align: center; padding: 8px 0; font-size: 10px; color: var(--text-muted); cursor: pointer;
    }
    .tab.active { color: var(--brand-green); }
    .tab-icon { font-size: 20px; display: block; margin-bottom: 2px; }

    /* Status badge */
    .status-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; color: #fff; }
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>

  <!-- Location Modal -->
  <div id="location-modal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="modal-title">選擇地點</span>
        <span class="modal-close" onclick="hideLocationModal()">✕</span>
      </div>
      <div id="location-list"></div>
      <div class="add-location" onclick="toggleAddForm()">
        <span>＋</span><span>新增地點</span>
      </div>
      <div class="add-location" onclick="useGPS()">
        <span>◎</span><span>使用目前位置</span>
      </div>
      <div id="add-form" class="add-form">
        <input id="loc-name" placeholder="地點名稱（如：公司）">
        <input id="loc-lat" placeholder="緯度（如：22.2810）">
        <input id="loc-lng" placeholder="經度（如：114.1580）">
        <div class="add-form-btns">
          <button class="btn-cancel" onclick="toggleAddForm()">取消</button>
          <button class="btn-save" onclick="saveLocation()">儲存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- S1: Home -->
  <div id="page-home" class="page active">
    <div class="header">
      <span class="header-title">午膳快</span>
      <span class="menu-btn" onclick="nav('settings')"></span>
    </div>
    <div class="location-bar">
      <div class="location-current" onclick="showLocationModal()">
        <span id="loc-display-name">載入中...</span>
        <span class="location-sub" id="loc-display-sub"></span>
      </div>
      <button class="location-refresh" onclick="refreshLocation()">刷新</button>
    </div>
    <div class="container">
      <div class="card budget-section">
        <div class="budget-row">
          <span class="budget-label">時間預算</span>
          <span class="budget-value" id="budget-display">30 分鐘</span>
        </div>
        <input type="range" class="budget-slider" id="budget-slider" min="15" max="60" step="15" value="30">
        <div class="mode-toggle" id="mode-toggle">
          <span class="mode-btn active" data-mode="strict">嚴格</span>
          <span class="mode-btn" data-mode="relaxed">寬鬆</span>
          <span class="mode-btn" data-mode="queue">隊列優先</span>
        </div>
      </div>

      <div class="cuisine-scroll">
        <div class="cuisine-chips" id="cuisine-chips"></div>
      </div>

      <div class="qp-card" onclick="doQuickPick()">
        <div class="qp-header"><span class="qp-title">幫我決定</span></div>
        <div class="qp-sub">根據你的口味推薦附近餐廳</div>
      </div>
      <div class="qp-modes" id="qp-modes">
        <span class="qp-mode active" data-mode="smart_mix">智能</span>
        <span class="qp-mode" data-mode="favorites_only">收藏</span>
        <span class="qp-mode" data-mode="try_new">嘗新</span>
      </div>

      <div id="rec-section" style="display:none;">
        <div class="card rec-card">
          <div class="rec-header">
            <span class="rec-name" id="rec-name"></span>
            <span class="heart-icon" id="rec-heart" onclick="toggleFav()">♥</span>
          </div>
          <div class="rec-details">
            <span id="rec-cuisine"></span>
            <span class="rec-dot" id="rec-dot">●</span>
            <span id="rec-distance"></span>
            <span class="rec-time" id="rec-time"></span>
          </div>
          <div class="rec-reason" id="rec-reason"></div>
          <div id="rec-address" style="font-size:12px;color:var(--text-muted);margin-bottom:10px;"></div>
          <div class="rec-actions">
            <button class="action-btn btn-accept" onclick="acceptPick()">就這家</button>
            <button class="action-btn btn-refresh" onclick="doQuickPick()">↻ 換一個</button>
            <button class="action-btn btn-detail" onclick="goToDetail()">詳情</button>
          </div>
        </div>
      </div>

      <div class="card fav-card" id="fav-card" style="display:none;" onclick="nav('favorites')">
        <div class="fav-header">
          <span class="fav-title" id="fav-title">我的收藏</span>
          <span style="font-size:12px;color:var(--text-muted);">›</span>
        </div>
        <div class="fav-preview" id="fav-preview"></div>
      </div>

      <button class="btn-primary" onclick="nav('list')">瀏覽附近餐廳</button>
    </div>
  </div>

  <!-- S3: List -->
  <div id="page-list" class="page">
    <div class="nav-back" onclick="nav('home')">返回</div>
    <div class="container">
      <div id="list-container"><div class="loading">載入中...</div></div>
      <div class="empty" id="list-empty" style="display:none;">
        <div>附近沒有餐廳</div>
        <div class="empty-hint">試試擴大範圍或更改篩選條件</div>
      </div>
    </div>
  </div>

  <!-- S2: Detail -->
  <div id="page-detail" class="page">
    <div class="nav-back" onclick="nav('home')">返回</div>
    <div class="container">
      <div class="card">
        <div class="rec-name" id="detail-name"></div>
        <div class="rec-details" id="detail-info"></div>
        <div class="list-meta" id="detail-address"></div>
        <div id="detail-hours" style="font-size:12px;color:var(--text-muted);margin-top:6px;"></div>
        <div id="detail-contact" style="font-size:12px;color:var(--text-muted);margin-top:4px;"></div>
      </div>
      <div class="rec-actions">
        <a id="detail-maps" href="#" class="action-btn btn-accept" style="text-decoration:none;display:inline-block;" target="_blank">導航</a>
        <button class="action-btn btn-refresh" onclick="toggleDetailFav()">♥ 收藏</button>
      </div>
    </div>
  </div>

  <!-- S7: Settings -->
  <div id="page-settings" class="page">
    <div class="nav-back" onclick="nav('home')">返回</div>
    <div class="container">
      <div class="card">
        <div class="setting-label">常用菜系</div>
        <div class="chips" id="settings-fav-cuisines"></div>
      </div>
      <div class="card">
        <div class="setting-label">排除菜系（最多3個）</div>
        <div class="chips" id="settings-excl-cuisines"></div>
      </div>
      <div class="card">
        <div class="setting-label">搜索範圍</div>
        <div class="price-options" id="radius-options"></div>
      </div>
    </div>
  </div>

  <!-- S9: Favorites -->
  <div id="page-favorites" class="page">
    <div class="nav-back" onclick="nav('home')">返回</div>
    <div class="container">
      <div class="mode-toggle" style="margin-bottom:12px;">
        <span class="mode-btn active" onclick="sortFav(this)" data-sort="recent">最近添加</span>
        <span class="mode-btn" onclick="sortFav(this)" data-sort="name">名稱</span>
      </div>
      <div id="fav-list"></div>
      <div class="empty" id="fav-empty" style="display:none;">
        <div>還沒有收藏的餐廳</div>
        <div class="empty-hint">在餐廳列表或推薦中點擊 ♥ 添加</div>
      </div>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab active" onclick="nav('home')"><span class="tab-icon">🏠</span>首頁</div>
    <div class="tab" onclick="nav('list')"><span class="tab-icon">🔍</span>瀏覽</div>
    <div class="tab" onclick="nav('favorites')"><span class="tab-icon">♥</span>收藏</div>
    <div class="tab" onclick="nav('settings')"><span class="tab-icon">⚙</span>設置</div>
  </div>

  <script>
    // ========== Configuration ==========
    const CUISINE_MAP = {
      'chinese': { label: '中式', emoji: '🥢' },
      'japanese': { label: '日式', emoji: '🍣' },
      'korean': { label: '韓式', emoji: '🥘' },
      'thai': { label: '泰國', emoji: '🍜' },
      'italian': { label: '意式', emoji: '🍝' },
      'mexican': { label: '墨西哥', emoji: '🌮' },
      'indian': { label: '印度', emoji: '🍛' },
      'vietnamese': { label: '越南', emoji: '🍲' },
      'seafood': { label: '海鮮', emoji: '🦐' },
      'steak_house': { label: '牛排', emoji: '🥩' },
      'pizza': { label: '薄餅', emoji: '🍕' },
      'burger': { label: '漢堡', emoji: '🍔' },
      'sandwich': { label: '三文治', emoji: '🥪' },
      'noodles': { label: '麵食', emoji: '🍜' },
      'sushi': { label: '壽司', emoji: '🍣' },
      'coffee_shop': { label: '咖啡', emoji: '☕' },
      'cake': { label: '甜品', emoji: '🍰' },
      'regional': { label: '地方菜', emoji: '🥡' },
      'asian': { label: '亞洲', emoji: '🥢' },
      'western': { label: '西式', emoji: '🍽' },
    };

    const DEFAULT_LOCATIONS = [
      { id: 'default_central', label: '中環', lat: 22.2810, lng: 114.1580, isDefault: true },
      { id: 'default_tst', label: '尖沙咀', lat: 22.2990, lng: 114.1730, isDefault: false },
      { id: 'default_cwb', label: '銅鑼灣', lat: 22.2790, lng: 114.1830, isDefault: false },
    ];

    // ========== Storage ==========
    const Store = {
      get(k, def) { try { const v = localStorage.getItem('lg_' + k); return v ? JSON.parse(v) : def; } catch { return def; } },
      set(k, v) { try { localStorage.setItem('lg_' + k, JSON.stringify(v)); } catch {} },
      getFavorites() { return this.get('favorites', []); },
      toggleFav(r) {
        let favs = this.getFavorites();
        const idx = favs.findIndex(f => f.id === r.id);
        if (idx >= 0) favs.splice(idx, 1);
        else favs.push({ id: r.id, name: r.name, cuisine: r.cuisine, favorited_at: Date.now() });
        this.set('favorites', favs);
        return idx < 0;
      },
      isFav(id) { return this.getFavorites().some(f => f.id === id); },
      getPrefs() { return this.get('prefs', { favorite_cuisines: [], excluded_cuisines: [], radius: 1000, quick_pick_mode: 'smart_mix' }); },
      setPrefs(p) { this.set('prefs', p); },
      getHistory() { return this.get('history', []); },
      addHistory(id) {
        let h = this.getHistory();
        h.unshift({ id, timestamp: Date.now() });
        if (h.length > 50) h.length = 50;
        this.set('history', h);
      },
      getLocations() {
        let locs = this.get('locations', null);
        if (!locs) {
          locs = DEFAULT_LOCATIONS;
          this.set('locations', locs);
        }
        return locs;
      },
      saveLocations(locs) { this.set('locations', locs); },
      getCurrentLocation() { return this.get('currentLocation', null); },
      setCurrentLocation(loc) { this.set('currentLocation', loc); },
      getRestaurantsCache() { return this.get('restaurantCache', null); },
      setRestaurantsCache(data) { this.set('restaurantCache', { ...data, cachedAt: Date.now() }); },
    };

    // ========== State ==========
    let state = {
      budget: 30,
      mode: 'strict',
      selectedCuisines: [],
      qpMode: 'smart_mix',
      recommendation: null,
      currentRest: null,
      favSort: 'recent',
      restaurants: [],
      currentLocation: null,
      loading: false,
    };

    // ========== Haversine ==========
    function haversine(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function formatDist(m) {
      return m < 1000 ? `${Math.round(m)}m` : `${(m/1000).toFixed(1)}km`;
    }

    // ========== Cuisine Mapping ==========
    function mapCuisine(raw) {
      if (!raw) return 'other';
      const lower = raw.toLowerCase();
      for (const key of Object.keys(CUISINE_MAP)) {
        if (lower.includes(key)) return key;
      }
      return 'other';
    }

    function cuisineDisplay(raw) {
      const key = mapCuisine(raw);
      const info = CUISINE_MAP[key];
      return info ? `${info.emoji} ${info.label}` : raw || '其他';
    }

    // ========== Location ==========
    function showLocationModal() {
      const locs = Store.getLocations();
      const current = Store.getCurrentLocation();
      document.getElementById('location-list').innerHTML = locs.map(l => `
        <div class="location-item ${current && current.id === l.id ? 'active' : ''}" onclick="selectLocation('${l.id}')">
          <div>
            <div class="location-item-name">${l.label}</div>
            <div class="location-item-sub">${l.lat.toFixed(4)}, ${l.lng.toFixed(4)}</div>
          </div>
          ${l.id.startsWith('default_') ? '' : `<span style="color:var(--status-red);font-size:12px;" onclick="event.stopPropagation();deleteLocation('${l.id}')">刪除</span>`}
        </div>
      `).join('');
      document.getElementById('location-modal').classList.add('show');
    }

    function hideLocationModal() {
      document.getElementById('location-modal').classList.remove('show');
      document.getElementById('add-form').classList.remove('show');
    }

    function closeModal(e) { if (e.target.classList.contains('modal-overlay')) hideLocationModal(); }

    function selectLocation(id) {
      const locs = Store.getLocations();
      const loc = locs.find(l => l.id === id);
      if (!loc) return;
      Store.setCurrentLocation(loc);
      state.currentLocation = loc;
      updateLocationDisplay();
      hideLocationModal();
      loadRestaurants();
    }

    function deleteLocation(id) {
      let locs = Store.getLocations().filter(l => l.id !== id);
      Store.saveLocations(locs);
      showLocationModal();
    }

    function toggleAddForm() {
      document.getElementById('add-form').classList.toggle('show');
    }

    function saveLocation() {
      const name = document.getElementById('loc-name').value.trim();
      const lat = parseFloat(document.getElementById('loc-lat').value);
      const lng = parseFloat(document.getElementById('loc-lng').value);
      if (!name || isNaN(lat) || isNaN(lng)) return toast('請填寫完整信息');

      const locs = Store.getLocations();
      const newLoc = { id: 'loc_' + Date.now(), label: name, lat, lng, isDefault: false };
      locs.push(newLoc);
      Store.saveLocations(locs);
      Store.setCurrentLocation(newLoc);
      state.currentLocation = newLoc;
      updateLocationDisplay();
      hideLocationModal();
      loadRestaurants();
      document.getElementById('loc-name').value = '';
      document.getElementById('loc-lat').value = '';
      document.getElementById('loc-lng').value = '';

    function useGPS() {
      if (!navigator.geolocation) return toast('瀏覽器不支援定位');
      toast('正在獲取位置...');
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;
          const loc = { id: 'gps', label: '目前位置', lat, lng, isDefault: false };
          Store.setCurrentLocation(loc);
          state.currentLocation = loc;
          updateLocationDisplay();
          hideLocationModal();
          loadRestaurants();
          toast('定位成功');
        },
        () => toast('定位失敗，請手動選擇地點'),
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    function refreshLocation() {
      const loc = state.currentLocation;
      if (!loc) return;
      if (loc.id === 'gps') {
        useGPS();
      } else {
        loadRestaurants();
      }
    }

    function updateLocationDisplay() {
      const loc = state.currentLocation;
      if (!loc) return;
      document.getElementById('loc-display-name').textContent = loc.label;
      const cache = Store.getRestaurantsCache();
      if (cache && cache.locId === loc.id) {
        const age = Math.round((Date.now() - cache.cachedAt) / 60000);
        document.getElementById('loc-display-sub').textContent = `${cache.count} 家 · ${age}分鐘前`;
      } else {
        document.getElementById('loc-display-sub').textContent = '';
      }
    }

    // ========== Restaurant Database ==========
    async function loadRestaurants() {
      if (state.loading) return;
      const loc = state.currentLocation;
      if (!loc) {
        document.getElementById('list-container').innerHTML = '<div class="empty">請先選擇地點</div>';
        return;
      }

      state.loading = true;
      document.getElementById('list-container').innerHTML = '<div class="loading">載入餐廳...</div>';

      const prefs = Store.getPrefs();
      const radius = prefs.radius || 1000;

      // Check cache first
      const cache = Store.getRestaurantsCache();
      if (cache && cache.locId === loc.id && (Date.now() - cache.cachedAt) < 24 * 3600 * 1000) {
        state.restaurants = cache.restaurants.map(r => ({
          ...r,
          distance: haversine(loc.lat, loc.lng, r.lat, r.lng),
          timeToTable: estimateTime(r),
        }));
        state.loading = false;
        updateLocationDisplay();
        return;
      }

      try {
        // Fetch from Overpass API
        const query = `[out:json][timeout:30];(node(around:${radius},${loc.lat},${loc.lng})["amenity"="restaurant"];node(around:${radius},${loc.lat},${loc.lng})["amenity"="fast_food"];node(around:${radius},${loc.lat},${loc.lng})["amenity"="cafe"];);out body;`;

        const resp = await fetch('https://overpass-api.de/api/interpreter', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'data=' + encodeURIComponent(query),
        });

        if (!resp.ok) throw new Error('API error');

        const data = await resp.json();
        const restaurants = [];

        for (const elem of (data.elements || [])) {
          const tags = elem.tags || {};
          const name = tags['name:zh'] || tags.name;
          if (!name) continue;

          restaurants.push({
            id: `osm_${elem.id}`,
            name: name,
            name_en: tags['name:en'] || '',
            lat: elem.lat,
            lng: elem.lon,
            cuisine: tags.cuisine || '',
            phone: tags.phone || tags['contact:phone'] || '',
            website: tags.website || tags['contact:website'] || '',
            address: tags['addr:full'] || tags['addr:street'] || '',
            opening_hours: tags.opening_hours || '',
            amenity: tags.amenity || 'restaurant',
          });
        }

        state.restaurants = restaurants.map(r => ({
          ...r,
          distance: haversine(loc.lat, loc.lng, r.lat, r.lng),
          timeToTable: estimateTime(r),
        }));

        // Cache
        Store.setRestaurantsCache({
          locId: loc.id,
          restaurants: restaurants,
          count: restaurants.length,
        });

        updateLocationDisplay();
      } catch (e) {
        console.error('Failed to fetch restaurants:', e);
        // Fallback to local data
        if (cache) {
          state.restaurants = cache.restaurants.map(r => ({
            ...r,
            distance: haversine(loc.lat, loc.lng, r.lat, r.lng),
            timeToTable: estimateTime(r),
          }));
        } else {
          state.restaurants = [];
        }
      }

      state.loading = false;
    }

    function estimateTime(r) {
      // Estimate based on amenity type
      const walkSpeed = 80; // meters per minute
      const walkTime = Math.round(r.distance / walkSpeed);

      let prepTime;
      switch (r.amenity) {
        case 'fast_food': prepTime = 5 + Math.random() * 5; break;
        case 'cafe': prepTime = 3 + Math.random() * 5; break;
        default: prepTime = 10 + Math.random() * 15; break;
      }

      const queueWait = r.amenity === 'fast_food' ? Math.random() * 5 : 5 + Math.random() * 15;
      return Math.round(walkTime + prepTime + queueWait);
    }

    // ========== Quick Pick ==========
    function doQuickPick() {
      const loc = state.currentLocation;
      if (!loc) return toast('請先選擇地點');
      if (state.restaurants.length === 0) {
        loadRestaurants().then(() => doQuickPick());
        return;
      }

      const prefs = Store.getPrefs();
      const favs = Store.getFavorites();
      const history = Store.getHistory();
      const maxTime = state.mode === 'strict' ? state.budget : state.budget * 1.5;

      let cands = state.restaurants.filter(r => {
        if (r.timeToTable > maxTime) return false;
        const cuisineKey = mapCuisine(r.cuisine);
        if (prefs.excluded_cuisines.includes(cuisineKey)) return false;
        if (state.selectedCuisines.length > 0 && !state.selectedCuisines.includes(cuisineKey)) return false;
        if (state.qpMode === 'favorites_only') return favs.some(f => f.id === r.id);
        if (state.qpMode === 'try_new') {
          const recent = history.slice(0, 5).map(h => h.id);
          if (recent.includes(r.id) || favs.some(f => f.id === r.id)) return false;
        }
        return true;
      });

      if (cands.length === 0) cands = state.restaurants.slice(0, 5);

      // Score
      const scored = cands.map(r => {
        let score = 0;
        if (favs.some(f => f.id === r.id)) score += 30;
        const ck = mapCuisine(r.cuisine);
        if (prefs.favorite_cuisines.includes(ck)) score += 15;
        score += Math.max(0, 50 - r.timeToTable);
        score += Math.random() * 10;
        return { ...r, score };
      });

      scored.sort((a, b) => b.score - a.score);
      const top3 = scored.slice(0, Math.min(3, scored.length));
      const total = top3.reduce((s, r) => s + r.score, 0);
      let rand = Math.random() * total;
      let pick = top3[0];
      for (const c of top3) { rand -= c.score; if (rand <= 0) { pick = c; break; } }

      const reasons = [];
      const ck = mapCuisine(pick.cuisine);
      if (prefs.favorite_cuisines.includes(ck)) reasons.push('符合你的口味');
      if (pick.timeToTable <= 20) reasons.push('距離近');
      if (pick.amenity === 'fast_food') reasons.push('出餐快');
      if (reasons.length === 0) reasons.push('值得一試');

      state.recommendation = pick;
      document.getElementById('rec-name').textContent = pick.name;
      document.getElementById('rec-cuisine').textContent = cuisineDisplay(pick.cuisine);
      document.getElementById('rec-distance').textContent = formatDist(pick.distance);
      document.getElementById('rec-time').textContent = pick.timeToTable + '分鐘';
      document.getElementById('rec-reason').textContent = reasons.join('，');
      document.getElementById('rec-address').textContent = pick.address || '';
      updateHeart();
      document.getElementById('rec-section').style.display = 'block';
    }

    function acceptPick() {
      const r = state.recommendation;
      if (!r) return;
      Store.addHistory(r.id);
      const prefs = Store.getPrefs();
      prefs.cuisine_weights = prefs.cuisine_weights || {};
      const ck = mapCuisine(r.cuisine);
      prefs.cuisine_weights[ck] = Math.min(1, (prefs.cuisine_weights[ck] || 0.5) + 0.1);
      Store.setPrefs(prefs);
      toast('已記錄你的選擇');
    }

    function toggleFav() {
      const r = state.recommendation;
      if (!r) return;
      const added = Store.toggleFav(r);
      updateHeart();
      updateFavCard();
      toast(added ? '已收藏' : '已取消收藏');
    }

    function updateHeart() {
      const h = document.getElementById('rec-heart');
      if (state.recommendation && Store.isFav(state.recommendation.id)) {
        h.classList.add('active');
      } else {
        h.classList.remove('active');
      }
    }

    function updateFavCard() {
      const favs = Store.getFavorites();
      const card = document.getElementById('fav-card');
      if (favs.length > 0) {
        card.style.display = 'block';
        document.getElementById('fav-title').textContent = `我的收藏 (${favs.length})`;
        document.getElementById('fav-preview').innerHTML = favs.slice(0, 3).map(f =>
          `<span class="fav-item">${f.name}</span>`
        ).join('');
      } else {
        card.style.display = 'none';
      }
    }

    // ========== Navigation ==========
    function nav(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + page).classList.add('active');
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      const tabs = { home: 0, list: 1, favorites: 2, settings: 3 };
      if (tabs[page] !== undefined) document.querySelectorAll('.tab')[tabs[page]].classList.add('active');
      if (page === 'list') renderList();
      if (page === 'favorites') renderFavorites();
      if (page === 'settings') renderSettings();
    }

    function goToDetail() {
      const r = state.recommendation;
      if (!r) return;
      showDetail(r);
    }

    function showDetail(r) {
      state.currentRest = r;
      document.getElementById('detail-name').textContent = r.name;
      document.getElementById('detail-info').innerHTML = `${cuisineDisplay(r.cuisine)} · ${formatDist(r.distance)} · 約${r.timeToTable}分鐘`;
      document.getElementById('detail-address').textContent = r.address || '';
      document.getElementById('detail-hours').textContent = r.opening_hours ? `營業時間：${r.opening_hours}` : '';
      document.getElementById('detail-contact').textContent = r.phone ? `電話：${r.phone}` : '';
      document.getElementById('detail-maps').href = `https://maps.google.com/?q=${r.lat},${r.lng}`;
      nav('detail');
    }

    // ========== List ==========
    function renderList() {
      if (state.restaurants.length === 0 && !state.loading) {
        loadRestaurants().then(() => renderList());
        return;
      }

      const prefs = Store.getPrefs();
      let filtered = state.restaurants.filter(r => {
        const ck = mapCuisine(r.cuisine);
        if (prefs.excluded_cuisines.includes(ck)) return false;
        if (state.selectedCuisines.length > 0 && !state.selectedCuisines.includes(ck)) return false;
        return true;
      });

      filtered.sort((a, b) => a.distance - b.distance);

      const container = document.getElementById('list-container');
      const empty = document.getElementById('list-empty');

      if (filtered.length === 0) {
        container.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      container.innerHTML = filtered.slice(0, 50).map(r => {
        const ck = mapCuisine(r.cuisine);
        const isFav = Store.isFav(r.id);
        return `
          <div class="card list-card" onclick='showDetail(${JSON.stringify(r).replace(/'/g, "\\'")})'>
            <div class="list-header">
              <span class="list-name">${r.name}${r.name_en ? ' <small style="color:var(--text-muted)">' + r.name_en + '</small>' : ''}</span>
              <span class="heart-icon ${isFav ? 'active' : ''}" onclick="event.stopPropagation();quickFav(${JSON.stringify(r).replace(/'/g, "\\'")})">♥</span>
            </div>
            <div class="list-meta">${cuisineDisplay(r.cuisine)} · ${formatDist(r.distance)} · 約${r.timeToTable}分鐘</div>
            <div class="list-tags">
              <span class="tag">${r.amenity === 'fast_food' ? '快餐' : r.amenity === 'cafe' ? '咖啡' : '餐廳'}</span>
              ${r.opening_hours ? '<span class="tag">🕐</span>' : ''}
              ${r.phone ? '<span class="tag">📞</span>' : ''}
            </div>
          </div>`;
      }).join('');
    }

    function quickFav(r) {
      const added = Store.toggleFav(r);
      updateFavCard();
      toast(added ? '已收藏' : '已取消收藏');
      renderList();
    }

    function toggleDetailFav() {
      const r = state.currentRest;
      if (!r) return;
      const added = Store.toggleFav(r);
      toast(added ? '已收藏' : '已取消收藏');
    }

    // ========== Favorites ==========
    function renderFavorites() {
      let favs = Store.getFavorites();
      if (state.favSort === 'name') favs.sort((a, b) => a.name.localeCompare(b.name, 'zh'));
      else favs.sort((a, b) => (b.favorited_at || 0) - (a.favorited_at || 0));

      const container = document.getElementById('fav-list');
      const empty = document.getElementById('fav-empty');

      if (favs.length === 0) {
        container.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      container.innerHTML = favs.map(f => {
        const loc = state.currentLocation;
        const dist = loc ? formatDist(haversine(loc.lat, loc.lng, f.lat, f.lng)) : '';
        return `
          <div class="card list-card" onclick='showDetail(${JSON.stringify(f).replace(/'/g, "\\'")})'>
            <div class="list-header">
              <span class="list-name">${f.name}</span>
              <span class="heart-icon active" onclick="event.stopPropagation();removeFav('${f.id}')">♥</span>
            </div>
            <div class="list-meta">${cuisineDisplay(f.cuisine)}${dist ? ' · ' + dist : ''}</div>
          </div>`;
      }).join('');
    }

    function sortFav(el) {
      document.querySelectorAll('#page-favorites .mode-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      state.favSort = el.dataset.sort;
      renderFavorites();
    }

    function removeFav(id) {
      let favs = Store.getFavorites().filter(f => f.id !== id);
      Store.set('favorites', favs);
      updateFavCard();
      renderFavorites();
      toast('已取消收藏');
    }

    // ========== Settings ==========
    function renderSettings() {
      const prefs = Store.getPrefs();
      const cuisines = Object.entries(CUISINE_MAP);

      document.getElementById('settings-fav-cuisines').innerHTML = cuisines.map(([k, v]) =>
        `<span class="chip ${prefs.favorite_cuisines.includes(k) ? 'active' : ''}"
              onclick="toggleSettingCuisine('${k}', 'fav')">${v.emoji} ${v.label}</span>`
      ).join('');

      document.getElementById('settings-excl-cuisines').innerHTML = cuisines.map(([k, v]) =>
        `<span class="chip ${prefs.excluded_cuisines.includes(k) ? 'chip-excluded' : ''}"
              onclick="toggleSettingCuisine('${k}', 'excl')">${v.label}</span>`
      ).join('');

      const radii = [500, 1000, 2000];
      document.getElementById('radius-options').innerHTML = radii.map(r =>
        `<span class="price-btn ${prefs.radius === r ? 'active' : ''}"
              onclick="setRadius(${r})">${r}m</span>`
      ).join('');
    }

    function toggleSettingCuisine(code, type) {
      const p = Store.getPrefs();
      const arr = type === 'fav' ? 'favorite_cuisines' : 'excluded_cuisines';
      const idx = p[arr].indexOf(code);
      if (idx > -1) p[arr].splice(idx, 1);
      else {
        if (type === 'excl' && p[arr].length >= 3) return toast('最多排除3個');
        p[arr].push(code);
      }
      Store.setPrefs(p);
      renderSettings();
    }

    function setRadius(r) {
      const p = Store.getPrefs();
      p.radius = r;
      Store.setPrefs(p);
      renderSettings();
      loadRestaurants();
    }

    // ========== Toast ==========
    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1500);
    }

    // ========== Cuisine Chips ==========

      const cuisines = [
        { key: 'chinese', label: '中式', emoji: '🥢' },
        { key: 'japanese', label: '日式', emoji: '🍣' },
        { key: 'korean', label: '韓式', emoji: '🥘' },
        { key: 'thai', label: '泰國', emoji: '🍜' },
        { key: 'italian', label: '意式', emoji: '🍝' },
        { key: 'indian', label: '印度', emoji: '🍛' },
        { key: 'seafood', label: '海鮮', emoji: '🦐' },
        { key: 'burger', label: '漢堡', emoji: '🍔' },
        { key: 'noodles', label: '麵食', emoji: '🍜' },
        { key: 'coffee_shop', label: '咖啡', emoji: '☕' },

          `<span class="chip ${savedCuisines.includes(c.key) ? 'active' : ''}"
                onclick="selectCuisine('${c.key}')">${c.emoji} ${c.label}</span>`

    function selectCuisine(code) {
      if (code === 'all') {
        state.selectedCuisines = [];
      } else {
        const idx = state.selectedCuisines.indexOf(code);
        if (idx > -1) state.selectedCuisines.splice(idx, 1);
        else {
          if (state.selectedCuisines.length >= 3) return toast('最多選擇3種菜系');
          state.selectedCuisines.push(code);
        }
      }
      Store.set('cuisine_filter', state.selectedCuisines);
      renderCuisineChips();
    }

    // ========== Init ==========
    function init() {
      // Load current location
      const loc = Store.getCurrentLocation();
      if (loc) {
        state.currentLocation = loc;
      } else {
        // Try GPS first
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              const newLoc = { id: 'gps', label: '目前位置', lat: pos.coords.latitude, lng: pos.coords.longitude };
              Store.setCurrentLocation(newLoc);
              state.currentLocation = newLoc;
              updateLocationDisplay();
              loadRestaurants();
            },
            () => {
              // GPS failed, use default
              const locs = Store.getLocations();
              const def = locs.find(l => l.isDefault) || locs[0];
              Store.setCurrentLocation(def);
              state.currentLocation = def;
              updateLocationDisplay();
              loadRestaurants();
            },
            { enableHighAccuracy: true, timeout: 5000 }
          );
        } else {
          const locs = Store.getLocations();
          const def = locs.find(l => l.isDefault) || locs[0];
          Store.setCurrentLocation(def);
          state.currentLocation = def;
          updateLocationDisplay();
          loadRestaurants();
        }
      }

      // Budget slider
      const slider = document.getElementById('budget-slider');
      slider.value = Store.get('budget', 30);
      state.budget = parseInt(slider.value);
      document.getElementById('budget-display').textContent = state.budget + ' 分鐘';
      slider.addEventListener('input', () => {
        state.budget = parseInt(slider.value);
        document.getElementById('budget-display').textContent = state.budget + ' 分鐘';
        Store.set('budget', state.budget);
      });

      // Mode toggle
      document.getElementById('mode-toggle').querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#mode-toggle .mode-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          state.mode = btn.dataset.mode;
        });
      });

      // QP modes
      const qpMode = Store.getPrefs().quick_pick_mode || 'smart_mix';
      state.qpMode = qpMode;
      document.querySelectorAll('#qp-modes .qp-mode').forEach(btn => {
        if (btn.dataset.mode === qpMode) btn.classList.add('active');
        else btn.classList.remove('active');
        btn.addEventListener('click', () => {
          document.querySelectorAll('#qp-modes .qp-mode').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          state.qpMode = btn.dataset.mode;
          const p = Store.getPrefs();
          p.quick_pick_mode = btn.dataset.mode;
          Store.setPrefs(p);
        });
      });

      renderCuisineChips();
      updateFavCard();
      if (loc) updateLocationDisplay();
    }

    init();
  </script>
</body>
</html>
