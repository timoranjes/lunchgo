<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LunchGo 搵食</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>

  <!-- Header -->
  <div class="header" id="main-header">
    <div class="header-top">
      <h1>LunchGo <span>搵食</span></h1>
      <button class="fav-btn" id="fav-btn">收藏</button>
      <button class="loc-btn" id="loc-btn">中環</button>
    </div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="搜尋餐廳名稱、地址、地區..." />
      <button class="search-clear" id="search-clear">×</button>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar">
    <button class="toolbar-btn active" data-sort="distance">距離最近</button>
    <button class="toolbar-btn" data-sort="rating">評分最高</button>
    <button class="toolbar-btn" data-sort="name">名稱排序</button>
    <button class="toolbar-btn" data-sort="district">地區排序</button>
  </div>

  <!-- Cuisine Filter -->
  <div class="cuisine-bar" id="cuisine-bar"></div>

  <!-- Error Banner -->
  <div class="error-banner" id="error-banner"></div>

  <!-- Discovery Section -->
  <div class="discovery-section" id="discovery-section" style="display:none;">
    <div class="discovery-header">
      <div>
        <div class="discovery-title">好去處推薦</div>
        <div class="discovery-subtitle" id="discovery-subtitle">高分餐廳</div>
      </div>
    </div>
    <div class="discovery-scroll" id="discovery-scroll"></div>
  </div>

  <!-- List View -->
  <div class="list-container" id="list-view">
    <div class="result-count" id="result-count"></div>
    <div id="rest-list"></div>
    <div class="load-more" id="load-more" style="display:none;">
      <button id="load-more-btn">載入更多</button>
    </div>
    <div class="empty" id="empty-state" style="display:none;">找不到餐廳</div>
    <div class="loading" id="loading-state">
      <div class="loading-spinner"></div>
      <div>載入餐廳...</div>
    </div>
  </div>

  <!-- Map View -->
  <div id="map-view">
    <div class="map-tile-toggle" id="map-tile-toggle">
      <button class="active" data-tile="roadmap">地圖</button>
      <button data-tile="satellite">衛星</button>
      <button data-tile="terrain">地形</button>
      <button data-tile="hybrid">混合</button>
    </div>
    <div id="map"></div>
    <div class="map-info-panel" id="map-panel">
      <button class="close-btn" id="map-panel-close">+</button>
      <div id="map-panel-content"></div>
    </div>
  </div>

  <!-- Detail View -->
  <div class="detail-overlay" id="detail-view">
    <div class="detail-header">
      <button class="detail-back" id="detail-back"></button>
      <span style="font-weight:600;">餐廳詳情</span>
      <button class="detail-fav" id="detail-fav">&#9825;</button>
    </div>
    <div id="detail-content"></div>
  </div>

  <!-- Favorites Page -->
  <div class="fav-page" id="fav-page">
    <div class="fav-page-header">
      <button class="fav-page-back" id="fav-back"></button>
      <span class="fav-page-title">收藏餐廳</span>
    </div>
    <div class="fav-sort-bar">
      <button class="fav-sort-btn active" data-fav-sort="recent">最近添加</button>
      <button class="fav-sort-btn" data-fav-sort="name">名稱</button>
      <button class="fav-sort-btn" data-fav-sort="distance">距離</button>
    </div>
    <div class="list-container" id="fav-list-container">
      <div id="fav-list"></div>
      <div class="empty" id="fav-empty">未收藏任何餐廳</div>
    </div>
  </div>

  <!-- Location Modal -->
  <div class="modal-overlay" id="loc-modal">
    <div class="modal-content">
      <div class="modal-title">選擇地點</div>
      <div id="loc-list"></div>
      <button class="gps-btn" id="gps-btn">使用目前位置 (GPS)</button>
      <div class="custom-section">
        <div class="custom-section-title">我的地點</div>
        <div id="custom-loc-list"></div>
        <button class="gps-btn" id="add-custom-loc-btn" style="border-style:solid;font-size:13px;">+ 新增地點</button>
      </div>
    </div>
  </div>

  <!-- Add Custom Location Modal -->
  <div class="modal-overlay" id="add-loc-modal">
    <div class="modal-content">
      <div class="modal-title">新增自訂地點</div>
      <div style="margin-bottom:12px;">
        <label style="font-size:13px;font-weight:500;display:block;margin-bottom:4px;">地點名稱</label>
        <input type="text" id="custom-loc-name" placeholder="例如：公司、家、運動場..." style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;" />
      </div>
      <div style="display:flex;gap:8px;">
        <button class="gps-btn" id="custom-loc-gps" style="flex:1;margin-top:0;">使用 GPS</button>
        <button class="gps-btn" id="custom-loc-map" style="flex:1;margin-top:0;">在地圖上選點</button>
      </div>
      <button class="gps-btn" id="cancel-custom-loc" style="margin-top:8px;border-style:solid;color:var(--text-secondary);border-color:var(--border);">取消</button>
    </div>
  </div>

  <!-- Random Pick Modal -->
  <div class="random-overlay" id="random-overlay">
    <div class="random-card">
      <div class="random-header" style="position:relative;">
        <button class="random-close" id="random-close">×</button>
        <h2>今天吃什麼？</h2>
        <p id="random-subtitle">讓我幫你決定！</p>
      </div>
      <div id="random-body">
        <div class="random-rolling">
          <div class="random-rolling-name" id="random-rolling-name">...</div>
        </div>
      </div>
      <div id="random-footer" style="display:none;">
        <div class="random-result">
          <div class="random-result-name" id="random-result-name"></div>
          <div class="random-result-detail" id="random-result-detail"></div>
          <div class="random-result-rating" id="random-result-rating"></div>
        </div>
        <div class="random-actions">
          <button class="action-btn action-btn-secondary" id="random-reroll">再選一次</button>
          <button class="action-btn action-btn-primary" id="random-view">查看詳情</button>
        </div>
      </div>
    </div>
  </div>

  <!-- View Toggle -->
  <div class="view-toggle" id="view-toggle">
    <button class="view-btn active" data-view="list">列表</button>
    <button class="view-btn" data-view="map">地圖</button>
  </div>

  <!-- Random Pick Button -->
  <button class="random-pick-btn" id="random-pick-btn">今天吃什麼</button>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Google Maps + Places -->
  <script src="https://maps.googleapis.com/maps/api/js?key=***&libraries=places&language=zh-TW&region=HK"></script>

  <script type="module">
    import Store from './src/store.js';
    import { state } from './src/state.js';
    import { haversine, formatDist, renderStars, priceLevel, escHtml, escAttr, matchCuisine } from './src/utils.js';
    import { loadPlacesDataLegacy, fetchPlaceDetailsLegacy, fetchPhotosForTopRestaurantsLegacy } from './src/api.js';
    import {
      updateDisplay,
      renderDiscovery,
      renderList,
      renderMapMarkers,
      showDetail,
      openRandomPick,
      closeRandomPick,
      rerollRandom,
      showRandomResult,
      renderFavorites,
      showFavoritesPage,
      hideFavoritesPage,
      showLocationModal,
      hideLocationModal,
      setRenderCallbacks,
      loadMoreRestaurants,
      setupLazyLoading,
      teardownLazyLoading,
      setFavSortMode,
      CUISINES as RENDER_CUISINES,
    } from './src/render.js';

    // -- Config --
    const GOOGLE_MAPS_API_KEY = 'YOUR_API_KEY_HERE';

    // Cuisine options (imported from render.js as RENDER_CUISINES)

    // Default HK locations
    const DEFAULT_LOCATIONS = [
      { id: 'central', label: '中環', lat: 22.2808, lng: 114.1588, isDefault: true },
      { id: 'causeway_bay', label: '銅鑼灣', lat: 22.2783, lng: 114.1825 },
      { id: 'mong_kok', label: '旺角', lat: 22.3193, lng: 114.1694 },
      { id: 'tsim_sha_tsui', label: '尖沙咀', lat: 22.2977, lng: 114.1728 },
      { id: 'quarry_bay', label: '鰂魚涌', lat: 22.2855, lng: 114.2158 },
    ];

    // -- State -- (imported from src/state.js)

    // -- Render Callbacks --
    // Wire up interactivity callbacks for the render module
    setRenderCallbacks({
      onCardClick: (id) => showDetail(id),
      onShowToast: (msg) => showToast(msg),
      onFetchPlaceDetails: (placeId, callback) => fetchPlaceDetails(placeId, callback),
      onHideFavoritesPage: () => hideFavoritesPage(),
    });

    // -- Storage -- (imported from src/store.js)
    // -- Utils -- (imported from src/utils.js)

    // -- Data Loading (Google Places) -- (imported from src/api.js)
    // loadPlacesDataLegacy, fetchPlaceDetailsLegacy, fetchPhotosForTopRestaurantsLegacy

    /**
     * Load Places data for the current location.
     * Delegates to src/api.js with error banner handling.
     */
    async function loadPlacesData(loc) {
      if (!state.placesService || state.placesLoaded) return;
      await loadPlacesDataLegacy(state, loc, () => {
        updateDisplay();
      }, (errorMsg) => {
        console.error('[LunchGo] Places nearbySearch failed:', errorMsg);
        const banner = document.getElementById('error-banner');
        banner.textContent = '載入餐廳資料失敗：' + errorMsg;
        banner.classList.add('show');
        setTimeout(() => banner.classList.remove('show'), 5000);
      });
    }

    /**
     * Fetch photos for top restaurants.
     * Delegates to src/api.js.
     */
    function fetchPhotosForTopRestaurants(places) {
      fetchPhotosForTopRestaurantsLegacy(places, state, () => {
        updateDisplay();
      });
    }

    /**
     * Fetch place details by place_id.
     * Delegates to src/api.js.
     */
    function fetchPlaceDetails(placeId, callback) {
      fetchPlaceDetailsLegacy(state, placeId, callback);
    }

    async function loadRestaurants() {
      const loc = state.currentLocation;
      if (!loc) return;

      document.getElementById('loading-state').style.display = 'block';
      document.getElementById('rest-list').innerHTML = '';
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('load-more').style.display = 'none';
      document.getElementById('error-banner').classList.remove('show');

      // Reset and load Places data
      state.placesData = [];
      state.placesLoaded = false;
      await loadPlacesData(loc);
    }

    // -- Discovery / Recommendations --
    // (moved to src/render.js)

    // -- List Rendering --
    // (moved to src/render.js)

    // -- Favorites Page --
    // (moved to src/render.js)
    // Note: favSortMode is managed via setFavSortMode() from render.js

    // -- Random Pick --
    // (moved to src/render.js)

    // -- Google Map --
    const mapTypes = {
      roadmap: google.maps.MapTypeId.ROADMAP,
      satellite: google.maps.MapTypeId.SATELLITE,
      terrain: google.maps.MapTypeId.TERRAIN,
      hybrid: google.maps.MapTypeId.HYBRID,
    };
    let currentMapType = 'roadmap';

    function initMap() {
      if (state.map) return;
      const loc = state.currentLocation;
      if (!loc) return;

      state.map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: loc.lat, lng: loc.lng },
        zoom: 14,
        zoomControl: false,
        streetViewControl: false,
        fullscreenControl: false,
        mapTypeControl: false,
        styles: [
          { featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] },
        ],
      });

      // User marker
      new google.maps.Marker({
        position: { lat: loc.lat, lng: loc.lng },
        map: state.map,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 10,
          fillColor: '#07C160',
          fillOpacity: 1,
          strokeColor: '#ffffff',
          strokeWeight: 3,
        },
        zIndex: 1000,
      });

      // Initialize Places service
      state.placesService = new google.maps.places.PlacesService(state.map);

      renderMapMarkers(state.filtered || state.placesData);
    }

    function switchMapType(name) {
      if (!state.map || !mapTypes[name]) return;
      state.map.setMapTypeId(mapTypes[name]);
      currentMapType = name;

      document.querySelectorAll('#map-tile-toggle button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tile === name);
      });
    }

    // -- Map Markers --
    // (moved to src/render.js)

    // -- Detail View --
    // (moved to src/render.js)

    // -- Location Modal --
    // (moved to src/render.js)

    function selectLocation(loc) {
      Store.setLocation(loc);
      state.currentLocation = loc;
      state.currentLocationLabel = loc.label;
      hideLocationModal();

      // Update header button text
      document.getElementById('loc-btn').textContent = loc.label;

      // Reset state
      state.placesData = [];
      state.filtered = [];
      state.placesLoaded = false;

      // Update map center
      if (state.map) {
        state.map.setCenter({ lat: loc.lat, lng: loc.lng });
        state.map.setZoom(14);
      }

      loadRestaurants();
      showToast('已切換至 ' + loc.label);
    }

    function useGPS() {
      if (!navigator.geolocation) {
        showToast('瀏覽器不支援定位');
        return;
      }
      showToast('正在獲取位置...');
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;

          // Reverse geocode to get address name
          if (state.geocoder) {
            state.geocoder.geocode({ location: { lat: lat, lng: lng } }, (results, status) => {
              let label = '目前位置';
              if (status === 'OK' && results && results[0]) {
                // Extract a short address name
                const addr = results[0].formatted_address;
                const parts = addr.split(',');
                // Use the first meaningful part (usually street/area name)
                label = parts[0].trim();
                if (parts.length > 1) {
                  // Add district if available
                  for (const p of parts.slice(1)) {
                    const trimmed = p.trim();
                    if (trimmed.includes('香港') || trimmed.includes('九龍') || trimmed.includes('新界')) {
                      label += ', ' + trimmed;
                      break;
                    }
                  }
                }
              }
              const loc = {
                id: 'gps_' + Date.now(),
                label: label,
                lat: lat,
                lng: lng
              };
              selectLocation(loc);
              hideLocationModal();
            });
          } else {
            const loc = { id: 'gps_' + Date.now(), label: '目前位置', lat: lat, lng: lng };
            selectLocation(loc);
            hideLocationModal();
          }
        },
        () => {
          showToast('定位失敗，請手動選擇地點');
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    // -- Toast --
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // -- View Toggle --
    function setView(view) {
      state.currentView = view;
      document.querySelectorAll('.view-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.view === view);
      });

      if (view === 'list') {
        document.getElementById('list-view').style.display = 'block';
        document.getElementById('map-view').classList.remove('active');
        document.querySelector('.header').style.display = '';
        document.querySelector('.toolbar').style.display = '';
        document.querySelector('.cuisine-bar').style.display = '';
        document.getElementById('discovery-section').style.display = state.filtered.filter(r => r.rating && r.rating > 0).length > 0 ? '' : 'none';
      } else {
        document.getElementById('list-view').style.display = 'none';
        document.getElementById('map-view').classList.add('active');
        document.querySelector('.header').style.display = '';
        document.querySelector('.toolbar').style.display = '';
        document.querySelector('.cuisine-bar').style.display = '';
        document.getElementById('discovery-section').style.display = 'none';
        initMap();
        setTimeout(() => {
          if (state.map) {
            google.maps.event.trigger(state.map, 'resize');
            renderMapMarkers(state.filtered || state.placesData);
          }
        }, 200);
      }
    }

    // -- Cuisine bar --
    function renderCuisineBar() {
      const bar = document.getElementById('cuisine-bar');
      bar.innerHTML = RENDER_CUISINES.map(c =>
        '<button class="cuisine-chip' + (state.activeCuisine === c.id ? ' active' : '') + '" data-cuisine="' + c.id + '">' + c.label + '</button>'
      ).join('');

      bar.querySelectorAll('.cuisine-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          state.activeCuisine = chip.dataset.cuisine;
          bar.querySelectorAll('.cuisine-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          updateDisplay();
        });
      });
    }

    // -- Init --
    function init() {
      // Restore location
      let loc = Store.getLocation();
      if (!loc) {
        loc = DEFAULT_LOCATIONS.find(l => l.isDefault) || DEFAULT_LOCATIONS[0];
        Store.setLocation(loc);
      }
      state.currentLocation = loc;
      state.currentLocationLabel = loc.label;

      // Initialize geocoder
      state.geocoder = new google.maps.Geocoder();

      // Update location button text to show current location
      document.getElementById('loc-btn').textContent = loc.label;

      // Search with debounce
      let searchTimer;
      const searchInput = document.getElementById('search-input');
      const searchClear = document.getElementById('search-clear');

      searchInput.addEventListener('input', (e) => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
          state.searchQuery = e.target.value.trim();
          searchClear.classList.toggle('visible', state.searchQuery.length > 0);
          updateDisplay();
        }, 200);
      });

      searchClear.addEventListener('click', () => {
        searchInput.value = '';
        state.searchQuery = '';
        searchClear.classList.remove('visible');
        updateDisplay();
      });

      // Sort buttons
      document.querySelectorAll('.toolbar-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.toolbar-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          state.currentSort = btn.dataset.sort;
          updateDisplay();
        });
      });

      // View toggle
      document.querySelectorAll('.view-btn').forEach(btn => {
        btn.addEventListener('click', () => setView(btn.dataset.view));
      });

      // Map type toggle (roadmap/satellite/terrain/hybrid)
      document.querySelectorAll('#map-tile-toggle button').forEach(btn => {
        btn.addEventListener('click', () => switchMapType(btn.dataset.tile));
      });

      // Load more button
      document.getElementById('load-more-btn').addEventListener('click', () => {
        updateDisplay(false);
      });

      // Location button
      document.getElementById('loc-btn').addEventListener('click', showLocationModal);
      document.getElementById('loc-modal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) hideLocationModal();
      });
      document.getElementById('gps-btn').addEventListener('click', useGPS);

      // Add custom location button
      document.getElementById('add-custom-loc-btn').addEventListener('click', () => {
        hideLocationModal();
        document.getElementById('add-loc-modal').classList.add('active');
        document.getElementById('custom-loc-name').value = '';
      });

      // Cancel custom location
      document.getElementById('cancel-custom-loc').addEventListener('click', () => {
        document.getElementById('add-loc-modal').classList.remove('active');
      });

      // Add custom location modal overlay click
      document.getElementById('add-loc-modal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) {
          document.getElementById('add-loc-modal').classList.remove('active');
        }
      });

      // Add custom location via GPS
      document.getElementById('custom-loc-gps').addEventListener('click', () => {
        if (!navigator.geolocation) {
          showToast('瀏覽器不支援定位');
          return;
        }
        showToast('正在獲取位置...');
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const name = document.getElementById('custom-loc-name').value.trim();
            if (!name) {
              showToast('請輸入地點名稱');
              return;
            }
            // Reverse geocode for better label
            let label = name;
            const saveAndClose = (finalLabel) => {
              const loc = {
                id: 'custom_' + Date.now(),
                label: finalLabel,
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                isCustom: true
              };
              Store.addCustomLocation(loc);
              document.getElementById('add-loc-modal').classList.remove('active');
              showToast('已新增 ' + finalLabel);
            };

            if (state.geocoder) {
              state.geocoder.geocode({ location: { lat: pos.coords.latitude, lng: pos.coords.longitude } }, (results, status) => {
                if (status === 'OK' && results && results[0]) {
                  label = name + ' (' + results[0].formatted_address.split(',')[0].trim() + ')';
                }
                saveAndClose(label);
              });
            } else {
              saveAndClose(label);
            }
          },
          () => {
            showToast('定位失敗');
          },
          { enableHighAccuracy: true, timeout: 10000 }
        );
      });

      // Add custom location via map pick
      document.getElementById('custom-loc-map').addEventListener('click', () => {
        document.getElementById('add-loc-modal').classList.remove('active');

        // Switch to map view temporarily
        setView('map');

        // Add click listener to map for location picking
        const pickListener = (e) => {
          const name = document.getElementById('custom-loc-name').value.trim() || '自訂地點';
          const loc = {
            id: 'custom_' + Date.now(),
            label: name,
            lat: e.latLng.lat(),
            lng: e.latLng.lng(),
            isCustom: true
          };
          Store.addCustomLocation(loc);
          state.map.removeListener('click', pickListener);

          // Switch back to list view
          setView('list');
          showToast('已新增 ' + name);
        };
        state.map.addListener('click', pickListener);
        showToast('點擊地圖選擇位置');
      });

      // Favorites button
      document.getElementById('fav-btn').addEventListener('click', showFavoritesPage);
      document.getElementById('fav-back').addEventListener('click', hideFavoritesPage);

      // Favorite sort buttons
      document.querySelectorAll('.fav-sort-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.fav-sort-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          setFavSortMode(btn.dataset.favSort);
          renderFavorites();
        });
      });

      // Detail back
      document.getElementById('detail-back').addEventListener('click', () => {
        document.getElementById('detail-view').classList.remove('active');
      });

      // Detail favorite toggle
      document.getElementById('detail-fav').addEventListener('click', () => {
        const detailEl = document.getElementById('detail-view');
        // Find the current restaurant being displayed
        const content = document.getElementById('detail-content');
        const nameEl = content.querySelector('.detail-name');
        if (!nameEl) return;
        const name = nameEl.textContent;
        const r = state.placesData.find(x => x.name === name);
        if (!r) return;
        const added = Store.toggleFav(r.id);
        const favBtn = document.getElementById('detail-fav');
        favBtn.textContent = added ? '\u2665' : '\u2661';
        favBtn.className = 'detail-fav' + (added ? ' is-fav' : '');
        showToast(added ? '已收藏' : '已取消收藏');
      });

      // Map panel close
      document.getElementById('map-panel-close').addEventListener('click', () => {
        document.getElementById('map-panel').classList.remove('active');
      });

      // Cuisine bar
      renderCuisineBar();

      // Random pick
      document.getElementById('random-pick-btn').addEventListener('click', openRandomPick);
      document.getElementById('random-close').addEventListener('click', closeRandomPick);
      document.getElementById('random-overlay').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeRandomPick();
      });
      document.getElementById('random-reroll').addEventListener('click', rerollRandom);
      document.getElementById('random-view').addEventListener('click', () => {
        if (state.randomPickResult) {
          showDetail(state.randomPickResult.id);
        }
      });

      // Load data
      loadRestaurants();
    }

    init();
  </script>
</body>
</html>
